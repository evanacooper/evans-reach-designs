        <div class="entri-iframe-body">
          <div class="entri-iframe-provider">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l9-5 9 5-9 5-9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
            <div>
              <div style="font-weight:600; font-size:14px;">We detected your DNS provider</div>
              <div style="font-size:12.5px; color:var(--text-muted);">Cloudflare · sign in to authorize the records for ${fullDomain}</div>
            </div>
          </div>
          <div class="entri-iframe-records">
            <div class="entri-iframe-record"><span>TXT</span> <code>${state.byo.subdomain}._domainkey</code> <span class="entri-iframe-tag">DKIM</span></div>
            <div class="entri-iframe-record"><span>CNAME</span> <code>pm-bounces.${state.byo.subdomain}</code> <span class="entri-iframe-tag">Return-Path</span></div>
            <div class="entri-iframe-record"><span>TXT</span> <code>_dmarc.${state.byo.subdomain}</code> <span class="entri-iframe-tag">DMARC</span></div>
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:18px;" onclick="entriSuccess()">Sign in to Cloudflare &amp; publish records</button>
          <button class="btn-link" style="display:block; margin:12px auto 0; background:none; border:0; color:var(--info); cursor:pointer; font-size:12.5px;" onclick="alert('Demo: Entri would let the user forward this setup to an IT contact via email.')">Forward setup to someone else</button>
        </div>
        <div class="entri-iframe-footer">
          <span class="demo-note" style="margin:0;">Simulated Entri iframe — not the real thing.</span>
          <button class="btn-link" style="background:none; border:0; color:var(--text-muted); cursor:pointer; font-size:12px;" onclick="entriClose()">Simulate close</button>
        </div>
      </div>
    </div>
  `;
}

function closedScreen() {
  return `
    <div class="shell">
      <div class="closed-stage">
        <p>Engage Setup closed.</p>
        <button class="btn btn-secondary" onclick="state.closed=false; render();">Re-open</button>
        <button class="btn btn-primary" onclick="resetPrototype();">Start over</button>
      </div>
    </div>
  `;
}

/* =========================================================
   RESET
   ========================================================= */
function resetPrototype() {
  state.step = 'brand';
  state.completed = new Set();
  state.brand.name = "Evan's Pet Care";
  state.brand.website = 'evanspetcare.com';
  state.business = { dba: "Evan's Pet Care", address1: '482 Maple Avenue', address2: 'Suite 12', city: 'Columbus', state: 'OH', zip: '43215', country: 'United States' };
  state.email = { prefix: 'hello', displayName: "Evan's Pet Care", replyTo: '', managedDomain: 'evans-pet-care.sent-mail.com', prefilledFromByo: false, managedTouched: false };
  state.byo = { status: 'none', rootDomain: 'evanspetcare.com', subdomain: 'send', prefix: 'hello', displayName: "Evan's Pet Care", replyTo: '', verifyProgress: 0 };
  state.merge = { firstName: '', lastName: '' };
  state.automations = { welcome: true, birthday: true, thankyou: false };
  state.showEntriModal = false;
  state.entriPhase = 'intro';
  state.closed = false;
  render();
}

/* =========================================================
   RENDER — with focus preservation across rerenders
   =========================================================
   The rerender pattern (innerHTML = new HTML) blows away the focused
   input on every keystroke. To preserve focus + caret position, we:
     1. Read the active element's data-focus-key + selectionStart/End
     2. Replace innerHTML
     3. Re-find the matching data-focus-key in the new tree, refocus,
        and restore caret position.
   Every input that should retain focus across renders has a unique
   data-focus-key attribute matching its state path. */
function render() {
  const stage = document.getElementById('stage');

  // Capture focus state BEFORE rerender
  const active = document.activeElement;
  let focusKey = null;
  let selStart = null, selEnd = null;
  if (active && active.dataset && active.dataset.focusKey) {
    focusKey = active.dataset.focusKey;
    if (typeof active.selectionStart === 'number') {
      selStart = active.selectionStart;
      selEnd = active.selectionEnd;
    }
  }

  if (state.closed) {
    stage.innerHTML = closedScreen();
    return;
  }

  let content;
  if (state.step === 'brand') content = brandStep();
  else if (state.step === 'business') content = businessStep();
  else if (state.step === 'byo') content = bringYourDomainStep();
  else if (state.step === 'senderDetails') content = senderDetailsStep();
  else if (state.step === 'sms') content = smsStep();
  else if (state.step === 'automations') content = automationsStep();
  else if (state.step === 'complete') content = completionScreen();

  if (state.showEntriModal) content += entriModalHTML();

  stage.innerHTML = content;

  // Restore focus AFTER rerender
  if (focusKey) {
    const target = stage.querySelector('[data-focus-key="' + focusKey + '"]');
    if (target) {
      target.focus();
      if (selStart !== null && typeof target.setSelectionRange === 'function') {
        try { target.setSelectionRange(selStart, selEnd); } catch (e) { /* ignore */ }
      }
    }
  }
}

render();
</script>
