<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Engage Onboarding — Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fafafa;
    --bg-elevated: #ffffff;
    --bg-muted: #f5f5f5;
    --bg-subtle: #f9fafb;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --border-focus: #6366f1;
    --text: #0a0a0a;
    --text-secondary: #4b5563;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-text: #ffffff;
    --primary-tint: #eef2ff;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --success-pill-bg: #dcfce7;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --warning-border: #fde68a;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --info: #2563eb;
    --info-bg: #eff6ff;
    --info-border: #bfdbfe;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-sm: 6px;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-modal: 0 24px 48px rgba(15, 23, 42, 0.18);
    --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    background: #ececec;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* Floating back-to-doc */
  .back-link {
    position: fixed; top: 12px; left: 12px; z-index: 9999;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    color: #64748b; background: white; border: 1px solid #e2e8f0;
    padding: 5px 11px; border-radius: 6px; text-decoration: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .back-link:hover { color: #1e293b; background: #f8fafc; }

  /* Stage holds the wizard centered in the viewport */
  .stage {
    max-width: 1180px;
    margin: 0 auto;
    padding: 56px 24px;
  }

  /* ============================================== */
  /* SHELL — settings-style sidebar + step circles  */
  /* ============================================== */
  .shell {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 720px;
    box-shadow: var(--shadow-card);
  }
  .shell-topbar {
    border-bottom: 1px solid var(--border);
    padding: 22px 36px 22px;
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .shell-title h1 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .shell-title p {
    font-size: 12.5px;
    color: var(--text-muted);
    margin: 0;
  }
  .close-btn {
    color: var(--text-muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 4px;
  }
  .close-btn:hover { color: var(--text); }

  .shell-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 0;
  }

  .shell-sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg-subtle);
    padding: 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .shell-sidebar-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    padding: 0 12px 10px;
  }

  /* Step item: circle marker + label, click target spans both */
  .step-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 13.5px;
    font-weight: 500;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    font-family: inherit;
    cursor: pointer;
  }
  .step-item:hover:not([data-clickable="false"]) { background: rgba(15, 23, 42, 0.04); }
  .step-item[data-clickable="false"] { cursor: not-allowed; }
  .step-item[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 600;
    box-shadow: var(--shadow-card);
  }
  .step-item[data-state="complete"] { color: var(--text); }

  /* Step markers: no numbers.
     - Upcoming = hollow ring (thin border, transparent fill)
     - Active   = filled solid dot in the primary text color
     - Complete = green checkmark circle (unchanged)
     We render the marker as an empty span and use ::before to draw
     the inner dot/check, so the marker's own dimensions stay fixed. */
  .step-item-marker {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0; /* hide any text content (step numbers) */
    color: transparent;
    position: relative;
  }
  .step-item[data-state="active"] .step-item-marker {
    border-color: var(--text);
    background: var(--bg-elevated);
  }
  .step-item[data-state="active"] .step-item-marker::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--text);
  }
  .step-item[data-state="complete"] .step-item-marker {
    border-color: var(--success);
    background: var(--success);
  }
  .step-item[data-state="complete"] .step-item-marker::before {
    content: "✓";
    font-size: 12px;
    font-weight: 700;
    color: white;
  }

  .shell-main {
    overflow-y: auto;
    padding: 36px 48px 32px;
    max-width: 100%;
    min-height: 540px;
  }
  .shell-main-narrow {
    max-width: 640px;
  }

  .shell-footer {
    border-top: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-elevated);
    gap: 16px;
  }

  /* ============================================== */
  /* DNS CONNECTION SECTION (Voice-style)           */
  /* ============================================== */
  .dns-section {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    overflow: hidden;
  }
  .dns-section[data-state="pending"] { border-color: var(--info-border); }
  .dns-section[data-state="wizard"] { background: var(--bg-elevated); }

  .dns-section-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid transparent;
  }
  .dns-section[data-state="wizard"] .dns-section-header {
    border-bottom-color: var(--border);
    background: var(--bg-subtle);
  }
  .dns-section-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .dns-section-icon {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dns-section-icon[data-tone="success"] {
    background: var(--success-pill-bg);
    color: var(--success);
  }
  .dns-section-icon[data-tone="info"] {
    background: var(--info-bg);
    color: var(--info);
  }
  .dns-section-icon[data-tone="muted"] {
    background: var(--bg-subtle);
    color: var(--text-secondary);
  }

  .dns-section-cancel {
    margin-left: auto;
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 12.5px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .dns-section-cancel:hover { color: var(--text); }

  .dns-section-body { padding: 20px; }
  .dns-section-body p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .dns-section-body p + p { margin-top: 8px; }
  .dns-section-body code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--bg-subtle);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .dns-section-actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .dns-section-bullets {
    list-style: none;
    margin: 12px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .dns-section-bullets li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .dns-section-bullets li svg {
    flex-shrink: 0;
    color: var(--success);
  }
  .reassurance-line {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Inline wizard within the DNS section */
  .dns-wizard {
    display: grid;
    grid-template-columns: 200px 1fr;
    min-height: 380px;
  }
  .dns-wizard-sidebar {
    background: var(--bg-subtle);
    border-right: 1px solid var(--border);
    padding: 18px 12px;
  }
  .dns-wizard-sidebar-eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    padding: 0 10px 8px;
  }
  .dns-wizard-sidebar ul {
    list-style: none;
    margin: 4px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .dns-wizard-sidebar li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 12.5px;
  }
  .dns-wizard-sidebar li[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 500;
    box-shadow: var(--shadow-card);
  }
  .dns-wizard-sidebar li[data-state="complete"] { color: var(--text); }
  .dns-wizard-sidebar li .marker {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8.5px;
    font-weight: 600;
    color: var(--text-faint);
  }
  .dns-wizard-sidebar li[data-state="active"] .marker {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }
  .dns-wizard-sidebar li[data-state="complete"] .marker {
    border-color: var(--success);
    background: var(--success);
    color: white;
    font-size: 0;
  }
  .dns-wizard-sidebar li[data-state="complete"] .marker::before {
    content: "✓";
    font-size: 8.5px;
    font-weight: 700;
  }

  .dns-wizard-content {
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .dns-wizard-content h3 {
    margin: 0 0 6px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .dns-wizard-content > p {
    margin: 0 0 18px;
    color: var(--text-secondary);
    font-size: 13.5px;
  }
  .dns-wizard-content-body { flex: 1; }
  .dns-wizard-footer {
    border-top: 1px solid var(--border);
    margin-top: 18px;
    padding-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .verifying-list { padding: 4px 0; }
  .verifying-row-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ============================================== */
  /* PATH CARDS (Email step: managed vs BYO)        */
  /* ============================================== */
  .path-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .path-card-header {
    padding: 18px 22px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-subtle);
  }
  .path-card-header h2 {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .path-card-header p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .path-card-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .path-card[data-tone="primary"] {
    border-color: var(--text);
    box-shadow: 0 0 0 1px var(--text);
  }
  .path-card[data-tone="primary"] .path-card-header {
    background: var(--text);
    color: white;
  }
  .path-card[data-tone="primary"] .path-card-header h2,
  .path-card[data-tone="primary"] .path-card-header p {
    color: white;
  }
  .path-card[data-tone="primary"] .path-card-header p { color: rgba(255,255,255,0.78); }
  .path-card[data-tone="primary"] .path-card-icon {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
    color: white;
  }
  .path-card-status-pill {
    margin-left: auto;
    background: var(--success-pill-bg);
    color: #166534;
    border: 1px solid var(--success-border);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .path-card-status-pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: currentColor;
  }
  .path-card[data-tone="primary"] .path-card-status-pill {
    background: rgba(34, 197, 94, 0.18);
    color: #86efac;
    border-color: rgba(34, 197, 94, 0.3);
  }
  .path-card-body { padding: 20px 22px; }

  /* ============================================== */
  /* COMPARISON PANEL (managed vs branded explainer) */
  /* ============================================== */
  .compare-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .compare-panel-header {
    padding: 14px 20px;
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .compare-panel-header h3 {
    margin: 0;
    font-size: 12.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .compare-panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .compare-panel-col {
    padding: 16px 18px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .compare-panel-col:last-child { border-right: 0; }
  .compare-panel-col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .compare-panel-col-header h4 {
    margin: 0;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
  }
  .compare-panel-col-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
  }
  .compare-panel-col[data-tone="branded"] .compare-panel-col-label {
    background: var(--success-bg, #f0fdf4);
    color: var(--success, #16a34a);
    border-color: var(--success-border, #bbf7d0);
  }
  .compare-panel-mini-inbox {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-subtle);
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .compare-panel-mini-inbox .mini-avatar {
    width: 24px; height: 24px;
    border-radius: 999px;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 11px;
    flex-shrink: 0;
  }
  .compare-panel-mini-inbox .mini-from {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }
  .compare-panel-mini-inbox .mini-via {
    font-weight: 400;
    color: var(--warning);
    background: var(--warning-bg);
    padding: 0 4px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .compare-panel-mini-inbox .mini-subject {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 240px;
  }
  .compare-panel-col-note {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Side-by-side diff table under the inboxes */
  .compare-diff {
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .compare-diff-row {
    display: contents;
  }
  .compare-diff-row > * {
    padding: 10px 18px;
    font-size: 12.5px;
    border-top: 1px solid var(--bg-subtle);
  }
  .compare-diff-row:first-child > * { border-top: 0; }
  .compare-diff-row .label {
    color: var(--text-muted);
    background: var(--bg-subtle);
    border-right: 1px solid var(--border);
    font-weight: 500;
  }
  .compare-diff-row .managed-cell,
  .compare-diff-row .branded-cell {
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .compare-diff-row .branded-cell { border-left: 1px solid var(--border); }
  .compare-diff-row .check {
    color: var(--success);
    flex-shrink: 0;
  }
  .compare-diff-row .neutral {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Inline upgrade hint chip next to the Sending Email Address field */
  .inline-upgrade-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .inline-upgrade-hint button {
    appearance: none;
    background: none;
    border: 0;
    padding: 0;
    color: var(--info);
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .inline-upgrade-hint button:hover { text-decoration: underline; }

  /* "How DNS setup works" / Entri context card */
  .entri-context {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    padding: 16px 18px;
    margin-top: 16px;
  }
  .entri-context-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .entri-context-header h4 {
    margin: 0;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
  }
  .entri-context-icon {
    width: 26px;
    height: 26px;
    border-radius: var(--radius-sm);
    background: var(--bg-subtle);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .entri-context-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .entri-context-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .entri-context-list li svg {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--text-faint);
  }
  .entri-context-list li strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Two-CTA row on the Sending Domain decision screen */
  .domain-choice-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .domain-choice-actions .btn-primary {
    flex: 1;
    justify-content: center;
    min-width: 180px;
    padding: 11px 18px;
  }
  .domain-choice-actions .btn-secondary {
    flex: 1;
    justify-content: center;
    min-width: 180px;
    padding: 11px 18px;
  }
  .domain-choice-reassurance {
    margin-top: 12px;
    font-size: 12.5px;
    color: var(--text-muted);
    text-align: center;
  }

  /* "Pre-filled from your branded domain setup" note on Sender Details */
  .prefill-note {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--success-bg, #f0fdf4);
    border: 1px solid var(--success-border, #bbf7d0);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 22px;
    font-size: 13px;
    line-height: 1.5;
    color: #166534;
  }
  .prefill-note svg { flex-shrink: 0; margin-top: 1px; color: var(--success, #16a34a); }

  /* "Your branded domain setup is paused" banner on Sender Details */
  .resume-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--warning-bg, #fffbeb);
    border: 1px solid var(--warning-border, #fde68a);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 22px;
  }
  .resume-banner > svg { flex-shrink: 0; color: var(--warning, #d97706); }
  .resume-banner-body {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }
  .resume-banner-body strong { font-size: 13px; color: #92400e; }
  .resume-banner-body span { font-size: 12.5px; color: #a16207; line-height: 1.45; }
  .resume-banner-body code { font-family: var(--font-mono); font-size: 11.5px; background: rgba(146,64,14,0.08); padding: 1px 5px; border-radius: 4px; }
  .btn-sm { padding: 7px 12px; font-size: 12.5px; flex-shrink: 0; }

  /* Soft warning chip used for deliverability nudges */
  .deliverability-chip {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--warning);
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
  }

  /* ============================================== */
  /* COMMON                                         */
  /* ============================================== */
  .step-header h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
    line-height: 1.2;
  }
  .step-header p {
    margin: 0 0 32px;
    color: var(--text-secondary);
    font-size: 15px;
    max-width: 580px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .form-group .helper {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: -2px;
  }
  .form-input {
    width: 100%;
    appearance: none;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font: inherit;
    font-size: 14px;
    background: var(--bg-elevated);
    color: var(--text);
  }
  .form-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
  }
  .req-asterisk { color: var(--danger); margin-left: 2px; }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }
  .form-row > .form-group { margin-bottom: 0; }

  .btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    font: inherit;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    transition: background 120ms ease, border-color 120ms ease, opacity 120ms;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .btn-primary {
    background: var(--text);
    color: white;
  }
  .btn-primary:hover:not(:disabled) { background: #1f2937; }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { border-color: var(--text); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-link {
    background: none; border: 0; color: var(--info);
    font-weight: 500; cursor: pointer; padding: 0;
    font-size: inherit;
  }
  .btn-link:hover { text-decoration: underline; }
  .btn-large { padding: 11px 20px; font-size: 14px; }
  .btn-block { width: 100%; justify-content: center; }

  /* Why-this-matters explainer */
  .why-explainer {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-subtle);
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .why-explainer svg { color: var(--info); flex-shrink: 0; margin-top: 1px; }
  .why-explainer strong { color: var(--text); font-weight: 600; }

  /* Sender prefix split */
  .sender-prefix-row {
    display: flex;
    align-items: stretch;
    gap: 0;
  }
  .sender-prefix-row input {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
    border-right: 0;
    max-width: 200px;
  }
  .sender-prefix-row .at-sign {
    display: inline-flex;
    align-items: center;
    padding: 0 10px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-left: 0;
    border-right: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .sender-prefix-row .domain-suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
  }
  .subdomain-row {
    display: flex;
    align-items: stretch;
  }
  .subdomain-row input {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
    border-right: 0;
    max-width: 180px;
  }
  .subdomain-row .domain-suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-muted);
  }

  /* Combined sending-address control: prefix @ subdomain . root, all editable,
     rendered as one bordered field with literal separators between segments. */
  .address-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg-elevated);
  }
  .address-row:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
  }
  .address-row input {
    border: 0;
    border-radius: 0;
    padding: 9px 12px;
    font: inherit;
    font-size: 14px;
    background: transparent;
    color: var(--text);
    min-width: 0;
  }
  .address-row input:focus { outline: none; box-shadow: none; }
  /* segment widths: prefix and subdomain are compact, root flexes to fill */
  .address-row input.seg-prefix { flex: 0 0 22%; }
  .address-row input.seg-subdomain { flex: 0 0 22%; }
  .address-row input.seg-root { flex: 1 1 auto; font-family: var(--font-mono); }
  .address-row .address-sep {
    display: inline-flex;
    align-items: center;
    padding: 0 8px;
    background: var(--bg-subtle);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 14px;
    flex-shrink: 0;
  }

  /* Inbox preview */
  .inbox-preview {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 10px;
  }
  .inbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .inbox-avatar {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  .inbox-meta { flex: 1; min-width: 0; }
  .inbox-from {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .inbox-via {
    font-weight: 400;
    color: var(--text-faint);
    font-size: 11.5px;
  }
  .inbox-subject {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
  }

  /* BYO nudge card */
  .byo-nudge {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    padding: 20px 22px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    margin-top: 32px;
  }
  .byo-nudge-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    background: var(--bg-subtle);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    flex-shrink: 0;
  }
  .byo-nudge-content h4 {
    margin: 0 0 4px;
    font-size: 14.5px;
    font-weight: 600;
  }
  .byo-nudge-content p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .byo-nudge-content .reassurance {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Resume chip */
  .resume-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 8px 14px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: var(--radius);
    font-size: 13px;
    color: #78350f;
    width: 100%;
  }
  .resume-chip svg { color: #b45309; flex-shrink: 0; }
  .resume-chip strong { color: #422006; font-weight: 600; }
  .resume-cta {
    margin-left: auto;
    font-size: 12.5px;
    font-weight: 600;
    color: #78350f;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
  }
  .resume-cta:hover { text-decoration: underline; }

  /* Sub-step pieces (root, subdomain, dmarc, connect) */
  .preview-chip {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .preview-chip-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
  }
  .preview-chip-value {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .info-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--info-bg);
    border: 1px solid var(--info-border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: #1e3a8a;
    font-size: 13px;
  }
  .info-banner svg { flex-shrink: 0; color: var(--info); margin-top: 1px; }

  .dmarc-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: start;
  }
  .dmarc-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--bg-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
  }
  .dmarc-content h4 {
    margin: 0 0 4px;
    font-size: 14.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dmarc-content p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .recommended-pill {
    background: var(--bg-subtle);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--text);
    border-radius: 999px;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 4px;
    border: 0;
    padding: 0;
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 18px;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 999px;
    transition: left 120ms ease;
  }
  .toggle[data-on="false"] { background: var(--border-strong); }
  .toggle[data-on="false"]::after { left: 2px; }

  /* Connect screen — entri vs manual */
  .connect-screen {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 40px;
    align-items: center;
    margin-top: 20px;
  }
  .connect-screen ul {
    list-style: none;
    margin: 16px 0 24px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .connect-screen li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }
  .connect-screen li svg { color: var(--text); flex-shrink: 0; }
  .connect-actions { display: flex; gap: 10px; }
  .connect-fineprint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .connect-art {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .connect-art::before {
    content: "";
    position: absolute;
    top: 24px; right: 24px;
    width: 80px; height: 80px;
    background-image: radial-gradient(var(--border-strong) 1.5px, transparent 1.5px);
    background-size: 12px 12px;
    opacity: 0.5;
  }
  .connect-art-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-card);
  }
  .connect-art-card.primary { transform: rotate(-5deg) translateX(20px); z-index: 2; }
  .connect-art-card.secondary {
    transform: rotate(5deg) translateX(-20px);
    border-style: dashed;
    background: transparent;
  }

  /* Verifying screen */
  .verifying-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .verifying-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .domain-name {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
  }
  .verifying-list {
    padding: 8px 0;
  }
  .verifying-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 14px 24px;
  }
  .verifying-row + .verifying-row { border-top: 1px solid var(--bg-subtle); }
  .verifying-icon {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .verifying-icon[data-state="ok"] { background: var(--success-pill-bg); color: var(--success); }
  .verifying-icon[data-state="pending"] {
    background: var(--bg-subtle);
    color: var(--text-faint);
    border: 1.5px dashed var(--border-strong);
  }
  .verifying-icon[data-state="working"] {
    background: var(--info-bg);
    color: var(--info);
  }
  .verifying-row .label { font-weight: 500; font-size: 13.5px; }
  .verifying-row .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .verifying-row .timestamp { font-size: 11.5px; color: var(--text-faint); font-family: var(--font-mono); }
  .verifying-foot {
    padding: 14px 24px;
    background: var(--bg-subtle);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--info);
    border-radius: 999px;
    animation: spin 800ms linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status pills */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .status-pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: currentColor;
  }
  .status-pending {
    background: var(--info-bg);
    color: #1e40af;
    border-color: var(--info-border);
  }
  .status-pending::before { animation: pulse 1.4s ease-in-out infinite; }
  .status-verified {
    background: var(--success-pill-bg);
    color: #166534;
    border-color: var(--success-border);
  }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Domain success card (after verification) */
  .domain-success-card {
    border: 1px solid var(--success-border);
    background: var(--success-bg);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    margin-top: 32px;
  }
  .domain-success-card .icon-circle {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    background: var(--success);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .domain-success-card h4 {
    margin: 0 0 2px;
    font-size: 14.5px;
    font-weight: 600;
    color: #14532d;
  }
  .domain-success-card p {
    margin: 0;
    font-size: 13px;
    color: #166534;
  }
  .domain-success-card code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: rgba(22, 101, 52, 0.08);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Brand step (compact for prototype) */
  .brand-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* SMS step */
  .sms-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 32px;
    text-align: center;
  }
  .sms-card .icon-circle {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: var(--bg-subtle);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    color: var(--text-secondary);
  }
  .sms-card h3 {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  .sms-card p {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 4px;
    max-width: 420px;
    margin-inline: auto;
  }
  .sms-card .timing {
    font-size: 12.5px;
    color: var(--text-muted);
    margin: 0 0 18px;
  }

  /* Merge fields step */
  .merge-explainer {
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 28px;
  }
  .merge-explainer h4 {
    margin: 0 0 12px;
    font-size: 13.5px;
    font-weight: 600;
    color: #14532d;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .merge-example {
    background: white;
    border: 1px solid var(--success-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .merge-example strong { color: var(--text); font-weight: 700; }
  .merge-example-label {
    font-size: 12.5px;
    color: #166534;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .merge-field-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    align-items: start;
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }
  .merge-field-row:first-of-type { border-top: 0; padding-top: 0; }
  .merge-field-row h5 {

  }
  .merge-field-row p {
    margin: 0;
    font-size: 12.5px;

  /* Automations */
  .automation-list {

    flex-direction: column;
    gap: 10px;
  }
  .automation-list-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elevated);
  }
  .automation-list-item h5 {
    margin: 0 0 2px;
    font-size: 14px;
    font-weight: 600;
  }
  .automation-list-item p {
    margin: 0;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .automation-list-item .icon-circle {
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    background: var(--bg-subtle);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  /* Final / completion screen */
  .completion {
    text-align: center;
    padding: 40px 20px;
  }
  .completion-icon {
    width: 64px;
    height: 64px;
    border-radius: 999px;
    background: var(--success);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .completion h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: -0.02em;
  }
  .completion p {
    font-size: 15px;
    color: var(--text-secondary);
    margin: 0 0 24px;
    max-width: 480px;
    margin-inline: auto;
  }
  .completion .summary {
    margin-top: 28px;
    text-align: left;
    max-width: 480px;
    margin-inline: auto;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .completion .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .completion .summary-row:first-child { border-top: 0; }
  .completion .summary-row .label { color: var(--text-muted); }
  .completion .summary-row .value { color: var(--text); font-weight: 500; }

  /* Entri fake modal */
  .entri-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(2px);
    animation: fadeIn 180ms ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .entri-modal {
    background: white;
    border-radius: var(--radius-lg);
    padding: 32px 36px;
    max-width: 480px;
    width: 90%;
    box-shadow: var(--shadow-modal);
    text-align: center;
    animation: pop 220ms ease;
  }
  @keyframes pop { from { transform: scale(0.92); } to { transform: scale(1); } }
  .entri-modal-mark {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    background: var(--text);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    font-size: 22px;
    font-weight: 700;
    font-family: var(--font-mono);
  }
  .entri-modal h2 {
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 10px;
  }
  .entri-modal p {
    font-size: 13.5px;
    color: var(--text-secondary);
    margin: 0 0 22px;
    line-height: 1.55;
  }
  .entri-modal .demo-note {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 18px;
    font-style: italic;
  }
  .entri-modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  /* Intro modal is wider + left-aligned to fit the how-it-works list */
  .entri-modal-intro {
    max-width: 520px;
    text-align: center;
    position: relative;
  }
  .entri-modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: transparent;
    border: 0;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    line-height: 0;
  }
  .entri-modal-close:hover { color: var(--text); }

  /* Phase 2: simulated Entri iframe chrome */
  .entri-iframe {
    background: white;
    border-radius: var(--radius-lg);
    width: 92%;
    max-width: 560px;
    box-shadow: var(--shadow-modal);

    flex-direction: column;

  .entri-iframe-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .entri-iframe-brand {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }
  .entri-iframe-dot {
    width: 20px; height: 20px;
    border-radius: 999px;
    background: var(--text);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
  }
  .entri-iframe-url {
    margin-left: auto;
    margin-right: 28px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    background: white;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 12px;
  }
  .entri-iframe .entri-modal-close { top: 11px; right: 12px; }
  .entri-iframe-body {
    padding: 24px;
  }
  .entri-iframe-provider {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;

    background: var(--bg-subtle);

  .entri-iframe-records {
    display: flex;

  }

    display: flex;

    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .entri-iframe-record > span:first-child {
    font-family: var(--font-mono);

    padding: 1px 6px;
    flex-shrink: 0;
    width: 52px;
    text-align: center;
  }
  .entri-iframe-record code {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    flex: 1;
    overflow: hidden;

  .entri-iframe-tag {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg-subtle);

    padding: 2px 9px;

  }
  .entri-iframe-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-subtle);
  }
  .btn-block { width: 100%; justify-content: center; }

  /* Closed/dismissed state */
  .closed-stage {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .closed-stage button {
    margin-top: 16px;
  }
</style>
</head>
<body>

<a class="back-link" href="index.html">
  <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2L3 6.5l5 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Back to project
</a>

<div class="stage" id="stage"></div>

<script>
/* =========================================================
   STATE
   ========================================================= */
const state = {
  // Top-level step: brand, business, email, sms, merge, automations, complete
  step: 'brand',
  // Track which top-level steps have been completed (for the stepper)
  completed: new Set(),

  // Brand
  brand: {
    name: "Evan's Pet Care",
    website: 'evanspetcare.com',
  },

  // Business info — required gate
  business: {
    dba: "Evan's Pet Care",
    address1: '482 Maple Avenue',
    address2: 'Suite 12',
    city: 'Columbus',
    state: 'OH',
    zip: '43215',
    country: 'United States',
  },

  // Email channel (the managed domain — always provisioned)
  email: {
    prefix: 'hello',
    displayName: "Evan's Pet Care",
    replyTo: '',
    // managed domain suffix (always provisioned)
    managedDomain: 'evans-pet-care.sent-mail.com',
    // True once the managed identity has been auto-populated from the BYO
    // setup the user just completed. Drives the "pre-filled" note on the
    // Sender Details step. Cleared the moment the user edits a field there.
    prefilledFromByo: false,
    // True once the user has manually touched any managed identity field on
    // the Sender Details step. Prevents the BYO copy from clobbering edits.
    managedTouched: false,
  },

  // Bring Your Domain state (single page — no sub-journey)
  byo: {
    // 'none' | 'verifying' | 'verified' | 'skipped'
    status: 'none',
    rootDomain: 'evanspetcare.com',
    subdomain: 'send',
    // Branded-domain sender identity, collected inline on the BYO page.
    prefix: 'hello',
    displayName: "Evan's Pet Care",
    replyTo: '',
    // Verifying progress (0=all pending, 1=DKIM ok, 2=DKIM+RP ok, 3=all ok)
    verifyProgress: 0,
  },

  // Merge fields
  merge: {
    firstName: '',
    lastName: '',
  },

  // Automations (recommended ones pre-on)
  automations: {
    welcome: true,
    birthday: true,
    thankyou: false,
  },

  // Fake Entri modal: false = closed, 'intro' = how-it-works phase,
  // 'iframe' = simulated Entri iframe phase.
  showEntriModal: false,
  entriPhase: 'intro',
  // Show closed/dismissed state
  closed: false,
};

const STEPS = [
  { key: 'brand', label: 'Brand' },
  { key: 'business', label: 'Business Info' },
  { key: 'byo', label: 'Bring Your Domain' },
  { key: 'senderDetails', label: 'Managed Domain' },
  { key: 'sms', label: 'SMS' },
  { key: 'automations', label: 'Automations' },
];

/* =========================================================
   STEP NAVIGATION
   ========================================================= */
function goToStep(key) {
  state.step = key;
  // Don't auto-complete; only mark complete on Continue
  render();
}

function continueStep() {
  // Mark current as complete and advance
  state.completed.add(state.step);
  const idx = STEPS.findIndex(s => s.key === state.step);
  const nextKey = idx === STEPS.length - 1 ? 'complete' : STEPS[idx + 1].key;

  // Entering Managed Domain? If the user connected (or is verifying) a branded
  // domain, carry that identity over so they don't re-enter the same details.
  // Only copy if the managed fields haven't been hand-edited yet.
  if (nextKey === 'senderDetails') {
    maybePrefillManagedFromByo();
  }

  state.step = nextKey;
  render();
}

/* Copy the branded-domain sender identity into the managed identity when the
   user reaches the Managed Domain step, so they don't re-enter the same
   details. Runs only when a branded domain was actually set up (verifying or
   verified) and the managed fields are still untouched. */
function maybePrefillManagedFromByo() {
  const byoRan = state.byo.status === 'verifying' || state.byo.status === 'verified';
  if (!byoRan) return;                     // skipped or untouched — nothing to copy
  if (state.email.managedTouched) return;  // user already customized managed

  state.email.prefix = state.byo.prefix || state.email.prefix;
  state.email.displayName = state.byo.displayName || state.email.displayName;
  if (state.byo.replyTo) state.email.replyTo = state.byo.replyTo;
  state.email.prefilledFromByo = true;
}

function backStep() {
  const idx = STEPS.findIndex(s => s.key === state.step);
  if (idx > 0) {
    state.step = STEPS[idx - 1].key;
    render();
  }
}

/* =========================================================
   BRING YOUR DOMAIN — single page actions
   ========================================================= */
/* Skip the branded domain — just move on to the next step. No interstitial
   screen; the user can always connect a domain later from settings. */
function skipByo() {
  state.byo.status = 'skipped';
  continueStep();
}

/* Open the Entri modal at the "how it works" intro phase. */
function openEntri() {
  state.showEntriModal = true;
  state.entriPhase = 'intro';
  render();
}

/* From the intro phase, "Continue with Entri" swaps the modal to the
   simulated Entri iframe phase. */
function launchEntriIframe() {
  state.entriPhase = 'iframe';
  render();
}

/* Entri (iframe) succeeded — close the modal and flip the page to the inline
   verifying state, animating the three records propagating. */
function entriSuccess() {
  state.showEntriModal = false;
  state.byo.status = 'verifying';
  state.byo.verifyProgress = 0;
  setTimeout(() => { state.byo.verifyProgress = 1; render(); }, 1800);
  setTimeout(() => { state.byo.verifyProgress = 2; render(); }, 3600);
  setTimeout(() => { state.byo.verifyProgress = 3; state.byo.status = 'verified'; render(); }, 5400);
  render();
}

function entriClose() {
  state.showEntriModal = false;
  state.entriPhase = 'intro';
  render();
}

/* =========================================================
   VALIDATION
   ========================================================= */
function businessRequiredFilled() {
  const b = state.business;
  return b.dba.trim() && b.address1.trim() && b.city.trim() && b.state.trim() && b.zip.trim() && b.country.trim();
}

function emailRequiredFilled() {
  return state.email.displayName.trim().length > 0;
}

/* Extract the root domain from a hostname (last two labels). */
function rootDomainOf(host) {
  if (!host) return '';
  const parts = host.split('.').filter(Boolean);
  return parts.length >= 2 ? parts.slice(-2).join('.') : host;
}

/* Suggest a reply-to address based on a sending domain.
   Used as a placeholder in the input so the user sees what's expected. */
function suggestedReplyTo(sendingDomain) {
  const root = rootDomainOf(sendingDomain);
  return root ? `info@${root}` : '';
}

/* Detect a cross-root-domain reply-to for the deliverability nudge.
   Returns true if the user typed a reply-to whose root domain
   doesn't match the sending domain's root. */
function replyToCrossDomain(replyTo, sendingDomain) {
  if (!replyTo || !replyTo.includes('@') || !sendingDomain) return false;
  const replyHost = replyTo.split('@')[1] || '';
  return rootDomainOf(replyHost) !== rootDomainOf(sendingDomain);
}

/* =========================================================
   RENDER HELPERS
   ========================================================= */
/* =========================================================
   SHELL — settings-style sidebar with step circle markers
   ========================================================= */
/* Static header subtitle — one sentence about Engage, the same on every
   screen. The sidebar shows progress, the right pane shows the step.
   The header just frames what we're doing here. */
const ONBOARDING_SUBTITLE = 'Configure how your business connects with customers over email and SMS. Settings can be changed anytime.';

function shellHeader() {
  return `
    <header class="shell-topbar">
      <div class="shell-title">
        <h1>Engage Setup</h1>
        <p>${ONBOARDING_SUBTITLE}</p>
      </div>
      <button class="close-btn" onclick="state.closed=true; render();" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </header>
  `;
}

function stepSidebar() {
  return `
    <aside class="shell-sidebar">
      <div class="shell-sidebar-eyebrow">Engage setup</div>
      ${STEPS.map((s, i) => {
        const isActive = state.step === s.key;
        const isComplete = state.completed.has(s.key);
        const stateAttr = isComplete ? 'complete' : (isActive ? 'active' : 'upcoming');
        // Completed steps and the current step are clickable. Upcoming are not.
        const clickable = isComplete || isActive;
        const onclick = clickable && !isActive ? `onclick="goToStep('${s.key}')"` : '';
        return `
          <button class="step-item" data-state="${stateAttr}" data-clickable="${clickable}" ${onclick} ${clickable ? '' : 'disabled'}>
            <span class="step-item-marker" aria-hidden="true"></span>
            ${s.label}
          </button>
        `;
      }).join('')}
    </aside>
  `;
}

function shellFooter({ canContinue = true, continueLabel = 'Continue', onContinue = 'continueStep()', onBack = 'backStep()', showBack = true, showContinue = true, continueHint = null, secondaryLabel = null, onSecondary = null } = {}) {
  // Optional secondary (white) action sits just left of the primary button.
  const secondary = secondaryLabel
    ? `<button class="btn btn-secondary" onclick="${onSecondary}">${secondaryLabel}</button>`
    : '';
  return `
    <footer class="shell-footer">
      ${showBack
        ? `<button class="btn btn-ghost" onclick="${onBack}">← Previous</button>`
        : `<span></span>`}
      <div style="display:flex; gap:10px; align-items:center;">
        ${showContinue
          ? `${secondary}<button class="btn btn-primary" ${canContinue ? '' : 'disabled'} onclick="${onContinue}">${continueLabel}</button>`
          : (continueHint ? `<span style="font-size: 12px; color: var(--text-muted);">${continueHint}</span>` : '')}
      </div>
    </footer>
  `;
}

/* Shell wrapper used by every step renderer:
   - topbar with "Engage Setup" + contextual subtitle + close X
   - left sidebar with step circle markers
   - right pane (the step content)
   - footer with Previous / Continue
*/
function shellWrap({ content, footerOpts = {}, hideFooter = false }) {
  return `
    <div class="shell">
      ${shellHeader()}
      <div class="shell-body">
        ${stepSidebar()}
        <main class="shell-main">
          ${content}
        </main>
      </div>
      ${hideFooter ? '' : shellFooter(footerOpts)}
    </div>
  `;
}

/* =========================================================
   STEP CONTENT
   ========================================================= */
function brandStep() {
  const content = `
    <div class="shell-main-narrow">
      <div class="step-header">
        <h1>Customize your brand</h1>
        <p>Tell us about your business so we can personalize your messages.</p>
      </div>

      <div class="form-group">
        <label>Business name</label>
        <span class="helper">This is how we'll refer to your business across emails and SMS.</span>
        <input class="form-input" type="text" value="${state.brand.name}" data-focus-key="brand.name"
          oninput="state.brand.name=this.value; state.email.displayName=this.value; render();" />
      </div>

      <div class="form-group">
        <label>Business website</label>
        <span class="helper">Used to suggest your sending domain later.</span>
        <input class="form-input" type="text" value="${state.brand.website}" data-focus-key="brand.website"
          oninput="state.brand.website=this.value; state.byo.rootDomain=this.value; render();" />
      </div>

      <p style="font-size: 12.5px; color: var(--text-muted); margin-top: 12px;">
        <em>Demo:</em> the existing Brand step has more fields (logo, brand colors, tone). For this prototype we're showing just name + website to keep the click-through fast.
      </p>
    </div>
  `;
  return shellWrap({ content, footerOpts: { showBack: false } });
}

function businessStep() {
  const canContinue = businessRequiredFilled();
  const content = `
    <div class="shell-main-narrow">
      <div class="step-header">
        <h1>Business Information</h1>
        <p>This is required before you can send marketing email or SMS — it's a legal compliance requirement.</p>
      </div>

      <div class="why-explainer">
        <svg class="icon-sm" width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8"/><path d="M10 6.5v4M10 13.5h.01"/></svg>
        <div><strong>Why this is required:</strong> CAN-SPAM (US) and similar laws require every marketing email to include a physical postal address. SMS providers also require business verification before they'll assign you a sending number.</div>
      </div>

      <div class="form-group">
        <label>DBA legal name<span class="req-asterisk">*</span></label>
        <input class="form-input" type="text" value="${state.business.dba}" data-focus-key="business.dba"
          oninput="state.business.dba=this.value; render();" />
      </div>

      <div class="form-group">
        <label>Business address<span class="req-asterisk">*</span></label>
        <input class="form-input" type="text" placeholder="Street address" value="${state.business.address1}" data-focus-key="business.address1"
          oninput="state.business.address1=this.value; render();" />
      </div>

      <div class="form-group">
        <label>Address line 2</label>
        <input class="form-input" type="text" placeholder="Apartment, suite, unit (optional)" value="${state.business.address2}" data-focus-key="business.address2"
          oninput="state.business.address2=this.value;" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>City<span class="req-asterisk">*</span></label>
          <input class="form-input" type="text" placeholder="City" value="${state.business.city}" data-focus-key="business.city"
            oninput="state.business.city=this.value; render();" />
        </div>
        <div class="form-group">
          <label>State<span class="req-asterisk">*</span></label>
          <input class="form-input" type="text" placeholder="State" value="${state.business.state}" data-focus-key="business.state"
            oninput="state.business.state=this.value; render();" />
        </div>
        <div class="form-group">
          <label>ZIP<span class="req-asterisk">*</span></label>
          <input class="form-input" type="text" placeholder="ZIP" value="${state.business.zip}" data-focus-key="business.zip"
            oninput="state.business.zip=this.value; render();" />
        </div>
      </div>

      <div class="form-group">
        <label>Country<span class="req-asterisk">*</span></label>
        <select class="form-input" onchange="state.business.country=this.value;">
          <option ${state.business.country === 'United States' ? 'selected' : ''}>United States</option>
          <option ${state.business.country === 'Canada' ? 'selected' : ''}>Canada</option>
          <option ${state.business.country === 'United Kingdom' ? 'selected' : ''}>United Kingdom</option>
        </select>
      </div>

      ${!canContinue ? `<p style="font-size: 12.5px; color: var(--text-muted); margin-top: 16px;">Fill in all required fields to continue.</p>` : ''}
    </div>
  `;
  return shellWrap({ content, footerOpts: { canContinue } });
}

/* =========================================================
   STEP: Sender Details  (now the SECOND of the two email steps)
   ---------------------------------------------------------
   Configures the managed-domain sender identity. If the user just
   went through BYO, these fields are pre-filled from that setup so
   they don't enter the same details twice. The managed domain is
   always configured during onboarding.
   ========================================================= */
/* =========================================================
   STEP: Bring Your Domain  (single page — no sub-journey)
   ---------------------------------------------------------
   Explains the benefits + what Entri is, collects all the
   branded-domain fields inline, and connects via Entri right
   here. The user can skip; skipping swaps the page to a short
   reassurance state. After Entri succeeds, the page flips to an
   inline "connected — verifying" state with the records animation.
   ========================================================= */
function bringYourDomainStep() {
  const byo = state.byo;
  const fullSendingDomain = `${byo.subdomain}.${byo.rootDomain}`;
  const replyToPlaceholder = suggestedReplyTo(fullSendingDomain);
  const replyToWarn = replyToCrossDomain(byo.replyTo, fullSendingDomain);

  // Verifying / verified — show the inline status instead of the form.
  if (byo.status === 'verifying' || byo.status === 'verified') {
    return shellWrap({ content: byoVerifyingContent(), footerOpts: { canContinue: true } });
  }

  // Default — the full single-page form. (A user who skipped and navigated
  // back lands here too, so they can still connect.)
  const content = `
    <div class="shell-main-narrow">
      <div class="step-header" style="display:flex; align-items:flex-start; justify-content:space-between; gap:24px;">
        <div>
          <h1>Send from your own domain</h1>
          <p>Optional, but recommended. Sending from your own domain (like <code style="font-family:var(--font-mono);font-size:13px;background:var(--bg-subtle);padding:1px 6px;border-radius:4px;">${fullSendingDomain}</code>) lands you in more inboxes on Gmail and Outlook and shows your brand instead of a platform tag. It takes about 5 minutes.</p>
        </div>
        <button class="btn btn-secondary" style="flex-shrink:0; white-space:nowrap;" onclick="skipByo()">Skip for now</button>
      </div>

      <!-- Combined sending address: prefix @ subdomain . root domain -->
      <div class="form-group" style="margin-top: 24px;">
        <label>Your sending address</label>
        <span class="helper">The full address your emails send from — your team alias before the <code>@</code>, then your sending subdomain and your domain. We pulled your domain from your business info.</span>
        <div class="address-row">
          <input class="seg-prefix" type="text" value="${byo.prefix}" placeholder="hello" aria-label="Email alias" data-focus-key="byo.prefix"
            oninput="state.byo.prefix=this.value; render();" />
          <span class="address-sep">@</span>
          <input class="seg-subdomain" type="text" value="${byo.subdomain}" placeholder="send" aria-label="Sending subdomain" data-focus-key="byo.subdomain"
            oninput="state.byo.subdomain=this.value; render();" />
          <span class="address-sep">.</span>
          <input class="seg-root" type="text" value="${byo.rootDomain}" placeholder="yourdomain.com" aria-label="Your domain" data-focus-key="byo.rootDomain"
            oninput="state.byo.rootDomain=this.value; render();" />
        </div>
      </div>

      <div class="form-group">
        <label>Display name<span class="req-asterisk">*</span></label>
        <span class="helper">What customers see in their inbox before the email opens.</span>
        <input class="form-input" type="text" value="${byo.displayName}" data-focus-key="byo.displayName"
          oninput="state.byo.displayName=this.value; render();" />
      </div>

      <div class="form-group">
        <label>Reply-to email</label>
        <span class="helper">For best deliverability, use an address on the same root domain as your sending domain.</span>
        <input class="form-input" type="email" placeholder="${replyToPlaceholder}" value="${byo.replyTo}" data-focus-key="byo.replyTo"
          oninput="state.byo.replyTo=this.value; render();" />
        ${replyToWarn ? `
          <span class="deliverability-chip">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L1 14h14L8 2z"/><path d="M8 6v3M8 11h.01"/></svg>
            Reply-to on a different root domain can hurt deliverability
          </span>
        ` : ''}
      </div>

      <!-- Inbox preview -->
      <div style="margin-top: 24px;">
        <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:10px;">How it appears in inbox</div>
        <div class="inbox-preview">
          <div class="inbox-row">
            <div class="inbox-avatar">${(byo.displayName || 'E').charAt(0).toUpperCase()}</div>
            <div class="inbox-meta">
              <div class="inbox-from">${byo.displayName || 'Your business'}</div>
              <div class="inbox-subject">${byo.prefix || 'hello'}@${fullSendingDomain} · Your dog's grooming is booked for Saturday</div>
            </div>
          </div>
        </div>
      </div>

      <p class="domain-choice-reassurance" style="text-align:left; margin-top:20px;">By selecting "Connect with Entri" you agree to Entri's <a href="https://www.entri.com/terms" style="color:var(--text-muted); text-decoration:underline;" target="_blank">Terms of Service</a> and <a href="https://www.entri.com/privacy" style="color:var(--text-muted); text-decoration:underline;" target="_blank">Privacy Policy</a>.</p>
    </div>
  `;

  // Footer carries both actions: white "Skip for now" + black "Connect with
  // Entri". Both move the user forward.
  return shellWrap({
    content,
    footerOpts: {
      continueLabel: 'Connect with Entri',
      onContinue: 'openEntri()',
      secondaryLabel: 'Skip for now',
      onSecondary: 'skipByo()',
    },
  });
}

/* Inline verifying / verified state shown on the Bring Your Domain page
   after Entri succeeds. */
function byoVerifyingContent() {
  const byo = state.byo;
  const p = byo.verifyProgress;
  const dkimState = p >= 1 ? 'ok' : (p === 0 ? 'working' : 'pending');
  const rpState = p >= 2 ? 'ok' : (p === 1 ? 'working' : 'pending');
  const dmarcState = p >= 3 ? 'ok' : (p === 2 ? 'working' : 'pending');
  const done = p >= 3;

  const icon = (st) => st === 'ok'
    ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5l2.5 2.5L10 3.5"/></svg>`
    : (st === 'working' ? `<div class="spinner" style="border-top-color: var(--info);"></div>` : '');
  const label = (st) => st === 'ok' ? 'verified just now' : (st === 'working' ? 'checking…' : 'pending');

  return `
    <div class="shell-main-narrow">
      <div class="step-header">
        <h1>${done ? 'Your domain is connected' : 'Connecting your domain'}</h1>
        <p>${done
          ? `All records are live. Email will send from <code style="font-family:var(--font-mono);font-size:13px;background:var(--bg-subtle);padding:1px 6px;border-radius:4px;">${byo.subdomain}.${byo.rootDomain}</code> with your brand. Continue to confirm your managed address.`
          : `Entri published your DNS records — we're confirming they've propagated worldwide. This usually takes 1–5 minutes. You can continue setting up; we'll let you know when it's done.`}</p>
      </div>
      <div class="dns-section" data-state="${done ? '' : 'pending'}">
        <div class="dns-section-header">
          <span class="dns-section-icon" data-tone="${done ? 'success' : 'info'}">
            ${done
              ? '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3L13 4.5"/></svg>'
              : '<div class="spinner" style="width: 12px; height: 12px;"></div>'}
          </span>
          <span class="dns-section-title">${byo.subdomain}.${byo.rootDomain}</span>
          <span style="margin-left: auto; font-size: 12px; color: var(--text-muted);">${done ? 'all records verified' : 'usually 1–5 minutes'}</span>
        </div>
        <div class="dns-section-body" style="padding: 0;">
          <div class="verifying-list">
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${dkimState}">${icon(dkimState)}</div>
              <div><div class="label">DKIM signing key</div><div class="verifying-row-meta">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_domainkey.${byo.subdomain}</code></div></div>
              <span class="timestamp">${label(dkimState)}</span>
            </div>
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${rpState}">${icon(rpState)}</div>
              <div><div class="label">Return-Path</div><div class="verifying-row-meta">CNAME for <code style="font-family:var(--font-mono);font-size:11.5px;">pm-bounces.${byo.subdomain}</code></div></div>
              <span class="timestamp">${label(rpState)}</span>
            </div>
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${dmarcState}">${icon(dmarcState)}</div>
              <div><div class="label">DMARC policy</div><div class="verifying-row-meta">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_dmarc.${byo.subdomain}</code></div></div>
              <span class="timestamp">${label(dmarcState)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* =========================================================
   STEP: Managed Domain  (was Sender Details)
   ---------------------------------------------------------
   The always-on sending address. Framed as ready-to-send now, and
   the address that keeps mail flowing if a branded domain ever has
   an issue. Pre-filled from the branded-domain setup when present.
   ========================================================= */
function senderDetailsStep() {
  const byo = state.byo;
  const senderDomain = state.email.managedDomain;
  // Reply-to for the managed domain should point at the business's OWN domain
  // (they don't control the managed sending domain), so suggest an address on
  // their real domain and don't run the cross-root deliverability warning here.
  const businessRoot = (state.brand.website || 'yourdomain.com').replace(/^www\./, '');
  const replyToPlaceholder = `hello@${businessRoot}`;
  const displayInitial = (state.email.displayName || 'E').charAt(0).toUpperCase();
  const displayName = state.email.displayName || 'Your business';
  const touch = "state.email.managedTouched=true; state.email.prefilledFromByo=false;";

  // Did the user connect a branded domain? Changes the framing + shows the note.
  const hasBranded = (byo.status === 'verifying' || byo.status === 'verified');
  const showPrefillNote = state.email.prefilledFromByo;

  const headerCopy = hasBranded
    ? `Your managed address is ready to use right now — handy for testing while your branded domain finishes verifying. You can send from it immediately, then switch to your branded domain once it's ready. We filled it in with the details you just provided; give it a quick look and continue.`
    : `This address is set up and ready — you can start sending as soon as you finish onboarding. Configure how your emails appear in your customers' inbox.`;

  const content = `
    <div class="shell-main-narrow">
      <div class="step-header">
        <h1>Your managed sending address</h1>
        <p>${headerCopy}</p>
      </div>

      ${showPrefillNote ? `
        <div class="prefill-note">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3L13 4.5"/></svg>
          <span>Filled in from your branded domain setup. Edit anything you'd like to be different for this address.</span>
        </div>
      ` : ''}

      <div class="form-group">
        <label>Sending email address</label>
        <span class="helper">Edit the prefix to match your team — common choices: <code>marketing</code>, <code>hello</code>, <code>news</code></span>
        <div class="sender-prefix-row">
          <input class="form-input" type="text" value="${state.email.prefix}" data-focus-key="email.prefix"
            oninput="${touch} state.email.prefix=this.value; render();" />
          <span class="at-sign">@</span>
          <span class="domain-suffix">${state.email.managedDomain}</span>
        </div>
      </div>

      <div class="form-group">
        <label>Display name<span class="req-asterisk">*</span></label>
        <span class="helper">What customers see in their inbox before the email opens.</span>
        <input class="form-input" type="text" value="${state.email.displayName}" data-focus-key="email.displayName"
          oninput="${touch} state.email.displayName=this.value; render();" />
      </div>

      <div class="form-group">
        <label>Reply-to email</label>
        <span class="helper">When customers reply, their response goes here — use an inbox you actually monitor, like <code>hello@${businessRoot}</code>. If left blank, replies go to a no-reply address.</span>
        <input class="form-input" type="email" placeholder="${replyToPlaceholder}" value="${state.email.replyTo}" data-focus-key="email.replyTo"
          oninput="${touch} state.email.replyTo=this.value; render();" />
      </div>

      <div style="margin-top: 24px;">
        <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:10px;">How it appears in inbox</div>
        <div class="inbox-preview">
          <div class="inbox-row">
            <div class="inbox-avatar">${displayInitial}</div>
            <div class="inbox-meta">
              <div class="inbox-from">
                ${displayName}
                <span class="inbox-via">via <strong style="color:var(--warning);">${state.email.managedDomain}</strong></span>
              </div>
              <div class="inbox-subject">${state.email.prefix || 'hello'}@${senderDomain} · Your dog's grooming is booked for Saturday</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  return shellWrap({ content, footerOpts: { canContinue: emailRequiredFilled() } });
}
