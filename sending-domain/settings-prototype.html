<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Engage Settings — Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fafafa;
    --bg-elevated: #ffffff;
    --bg-muted: #f5f5f5;
    --bg-subtle: #f9fafb;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --border-focus: #6366f1;
    --text: #0a0a0a;
    --text-secondary: #4b5563;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --primary: #4f46e5;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --success-pill-bg: #dcfce7;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --warning-border: #fde68a;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --info: #2563eb;
    --info-bg: #eff6ff;
    --info-border: #bfdbfe;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-sm: 6px;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-modal: 0 24px 48px rgba(15, 23, 42, 0.18);
    --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    background: #ececec;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  .back-link {
    position: fixed; top: 12px; left: 12px; z-index: 9999;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    color: #64748b; background: white; border: 1px solid #e2e8f0;
    padding: 5px 11px; border-radius: 6px; text-decoration: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .back-link:hover { color: #1e293b; background: #f8fafc; }

  .stage {
    max-width: 1180px;
    margin: 0 auto;
    padding: 56px 24px;
  }

  /* ============================================== */
  /* SHELL — settings flavor (no top stepper)       */
  /* ============================================== */
  .shell {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 720px;
    box-shadow: var(--shadow-card);
  }
  .shell-topbar {
    border-bottom: 1px solid var(--border);
    padding: 22px 36px 22px;
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .shell-title h1 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .shell-title p {
    font-size: 12.5px;
    color: var(--text-muted);
    margin: 0;
  }
  .close-btn {
    color: var(--text-muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 4px;
  }
  .close-btn:hover { color: var(--text); }

  .shell-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 0;
  }
  .shell-body[data-mode="byo"] {
    grid-template-columns: 240px 1fr;
  }

  .shell-sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg-subtle);
    padding: 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .shell-sidebar-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    padding: 0 12px 10px;
  }
  .shell-sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .shell-sidebar-item:hover { background: rgba(15, 23, 42, 0.04); }
  .shell-sidebar-item[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 600;
    box-shadow: var(--shadow-card);
  }

  .shell-sidebar-parent {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .shell-sidebar-parent:hover { background: rgba(15, 23, 42, 0.04); }
  .shell-sidebar-parent svg { color: var(--text-muted); }
  .shell-sidebar-substeps {
    list-style: none;
    margin: 4px 0 0;
    padding: 0 0 0 22px;
    border-left: 1px dashed var(--border-strong);
    margin-left: 22px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .shell-sidebar-substeps li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 13px;
  }
  .shell-sidebar-substeps li[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 500;
    box-shadow: var(--shadow-card);
  }
  .shell-sidebar-substeps li[data-state="complete"] { color: var(--text); }
  .shell-sidebar-substep-marker {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-faint);
  }
  .shell-sidebar-substeps li[data-state="active"] .shell-sidebar-substep-marker {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }
  .shell-sidebar-substeps li[data-state="complete"] .shell-sidebar-substep-marker {
    border-color: var(--success);
    background: var(--success);
    color: white;
    font-size: 0;
  }
  .shell-sidebar-substeps li[data-state="complete"] .shell-sidebar-substep-marker::before {
    content: "✓";
    font-size: 9px;
    font-weight: 700;
  }

  .shell-main {
    overflow-y: auto;
    padding: 36px 48px 32px;
    max-width: 100%;
    min-height: 540px;
  }

  .page-header {
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .page-header p {
    margin: 0;
    color: var(--text-secondary);
    font-size: 14px;
    max-width: 640px;
  }

  /* ============================================== */
  /* COMMON                                         */
  /* ============================================== */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .form-group .helper {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: -2px;
  }
  .shell-main-narrow { max-width: 640px; }
  .req-asterisk { color: var(--danger, #dc2626); margin-left: 2px; }

  /* Combined sending-address row: prefix @ subdomain . root (ported from
     onboarding so settings' Add-domain / inline DNS forms match). */
  .address-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg-elevated);
  }
  .address-row:focus-within {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
  }
  .address-row input {
    border: 0;
    border-radius: 0;
    padding: 9px 12px;
    font: inherit;
    font-size: 14px;
    background: transparent;
    color: var(--text);
    min-width: 0;
  }
  .address-row input:focus { outline: none; box-shadow: none; }
  .address-row input.seg-prefix { flex: 0 0 22%; }
  .address-row input.seg-subdomain { flex: 0 0 22%; }
  .address-row input.seg-root { flex: 1 1 auto; font-family: var(--font-mono); }
  .address-row .address-sep {
    display: inline-flex;
    align-items: center;
    padding: 0 8px;
    background: var(--bg-subtle);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 14px;
    flex-shrink: 0;
  }
  .address-row[data-active="prefix"] input.seg-prefix,
  .address-row[data-active="subdomain"] input.seg-subdomain,
  .address-row[data-active="root"] input.seg-root {
    background: rgba(99, 102, 241, 0.08);
  }
  .address-seg-helper { transition: color 0.12s ease; }
  .address-seg-helper[data-active="prefix"],
  .address-seg-helper[data-active="subdomain"],
  .address-seg-helper[data-active="root"] {
    color: var(--text-secondary);
  }
  .address-seg-helper strong { color: var(--text); font-weight: 600; }

  .form-input {
    width: 100%;
    appearance: none;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font: inherit;
    font-size: 14px;
    background: var(--bg-elevated);
    color: var(--text);
  }
  .form-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
  }

  .btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    font: inherit;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    transition: background 120ms ease, border-color 120ms ease, opacity 120ms;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .btn-primary { background: var(--text); color: white; }
  .btn-primary:hover:not(:disabled) { background: #1f2937; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { border-color: var(--text); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-link {
    background: none; border: 0; color: var(--info);
    font-weight: 500; cursor: pointer; padding: 0;
    font-size: inherit;
  }
  .btn-link:hover { text-decoration: underline; }
  .btn-danger {
    background: var(--bg-elevated);
    color: var(--danger);
    border: 1px solid var(--danger-border);
  }
  .btn-danger:hover { background: var(--danger-bg); }

  /* Sender prefix split */
  .sender-prefix-row {
    display: flex;
    align-items: stretch;
  }
  .sender-prefix-row input {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
    border-right: 0;
    max-width: 200px;
  }
  .sender-prefix-row .at-sign {
    display: inline-flex;
    align-items: center;
    padding: 0 10px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-left: 0;
    border-right: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .sender-prefix-row .domain-suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
  }

  /* Inbox preview */
  .inbox-preview {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 10px;
  }
  .inbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .inbox-avatar {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  .inbox-meta { flex: 1; min-width: 0; }
  .inbox-from {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .inbox-via {
    font-weight: 400;
    color: var(--text-faint);
    font-size: 11.5px;
  }
  .inbox-subject {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
  }

  /* Section divider */
  .section-block {
    margin-bottom: 32px;
  }
  .section-block + .section-block {
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }
  .section-block-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 14px;
  }
  .section-block-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .section-block-header h3 {
    margin: 0;
    font-size: 14.5px;
    font-weight: 600;
  }

  /* Sticky save bar */
  .save-bar {
    position: sticky;
    bottom: 0;
    margin: 28px -48px -32px;
    padding: 14px 48px;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .save-bar .dirty-text {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* Status pills */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .status-pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: currentColor;
  }
  .status-pending {
    background: var(--info-bg);
    color: #1e40af;
    border-color: var(--info-border);
  }
  .status-pending::before { animation: pulse 1.4s ease-in-out infinite; }
  .status-verified {
    background: var(--success-pill-bg);
    color: #166534;
    border-color: var(--success-border);
  }
  .status-disconnected {
    background: var(--danger-bg);
    color: #991b1b;
    border-color: var(--danger-border);
  }
  .status-managed {
    background: var(--bg-subtle);
    color: var(--text-secondary);
    border-color: var(--border);
  }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Domain table */
  .domain-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-elevated);
  }
  .domain-table th {
    text-align: left;
    padding: 11px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border);
  }
  .domain-table td {
    padding: 16px;
    border-top: 1px solid var(--bg-subtle);
    vertical-align: middle;
    font-size: 13.5px;
  }
  .domain-table tr:first-child td { border-top: 0; }
  /* Clickable rows: hover background + chevron affordance */
  .domain-table tbody tr {
    transition: background-color 120ms ease;
    position: relative;
  }
  .domain-table tbody tr:hover {
    background: var(--bg-subtle);
  }
  .domain-table tbody tr:hover .row-chevron {
    color: var(--text);
    transform: translateX(2px);
  }
  .domain-table tbody tr[data-disconnected="true"]:hover {
    background: #fde8e8;
  }
  .row-chevron {
    display: inline-flex;
    color: var(--text-faint);
    margin-left: 8px;
    transition: color 120ms ease, transform 120ms ease;
  }
  .domain-table .domain-name-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .domain-table .domain-name-cell .name {
    font-family: var(--font-mono);
    font-size: 13.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .domain-table .domain-name-cell .purpose {
    font-size: 11.5px;
    color: var(--text-muted);
  }
  .default-badge {
    background: var(--bg-subtle);
    color: var(--text-secondary);
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 500;
    border: 1px solid var(--border);
    font-family: var(--font-sans);
  }
  /* Default pill — star icon + label as a single visually-bound component.
     Two variants: read-only (current default) and action (clickable to set). */
  .default-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-left: 10px;
    padding: 2px 9px 2px 7px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    font-family: var(--font-sans);
    letter-spacing: 0.02em;
    background: #fef9c3;
    color: #854d0e;
    border: 1px solid #fde68a;
    cursor: default;
  }
  .default-pill svg { color: #d97706; }
  /* Action variant: hidden by default, fades in only when the
     ancestor table row is hovered. Keeps the row scannable when
     idle and offers the action when the user shows intent. */
  .default-pill--action {
    background: var(--bg-subtle);
    color: var(--text-muted);
    border-color: var(--border);
    border: 1px dashed var(--border-strong);
    cursor: pointer;
    appearance: none;
    font-family: inherit;
    opacity: 0;
    pointer-events: none;
    transition: color 120ms ease, background 120ms ease, border-color 120ms ease, opacity 120ms ease;
  }
  .domain-table tbody tr:hover .default-pill--action {
    opacity: 1;
    pointer-events: auto;
  }
  /* Keep focus visibility for keyboard users even without row hover */
  .default-pill--action:focus-visible {
    opacity: 1;
    pointer-events: auto;
    outline: 2px solid var(--border-focus);
    outline-offset: 2px;
  }
  .default-pill--action svg { color: var(--text-faint); transition: color 120ms ease; }
  .default-pill--action:hover {
    background: #fef9c3;
    color: #854d0e;
    border-color: #fde68a;
    border-style: solid;
  }
  .default-pill--action:hover svg { color: #d97706; }
  .domain-table .actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .icon-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }

  /* Disconnect banner */
  .disconnect-banner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    color: #7f1d1d;
  }
  .disconnect-banner svg { color: var(--danger); flex-shrink: 0; margin-top: 2px; }
  .disconnect-banner h4 {
    margin: 0 0 4px;
    font-size: 13.5px;
    font-weight: 600;
    color: #7f1d1d;
  }
  .disconnect-banner p {
    margin: 0 0 8px;
    font-size: 12.5px;
    color: #991b1b;
  }
  .disconnect-banner code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: rgba(127, 29, 29, 0.08);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .disconnect-banner .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  /* ============================================== */
  /* DNS CONNECTION SECTION (Voice-style splash/    */
  /* configured/disconnected/wizard inline)         */
  /* ============================================== */
  .dns-section {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    overflow: hidden;
  }
  .dns-section[data-state="disconnected"] {
    border-color: var(--danger-border);
    background: var(--danger-bg);
  }
  .dns-section[data-state="pending"] {
    border-color: var(--info-border);
  }
  .dns-section[data-state="wizard"] {
    background: var(--bg-elevated);
  }

  .dns-section-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid transparent;
  }
  .dns-section[data-state="wizard"] .dns-section-header {
    border-bottom-color: var(--border);
    background: var(--bg-subtle);
  }
  .dns-section-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .dns-section[data-state="disconnected"] .dns-section-title {
    color: #7f1d1d;
  }
  .dns-section-icon {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dns-section-icon[data-tone="success"] {
    background: var(--success-pill-bg);
    color: var(--success);
  }
  .dns-section-icon[data-tone="info"] {
    background: var(--info-bg);
    color: var(--info);
  }
  .dns-section-icon[data-tone="warning"] {
    background: var(--warning-bg);
    color: var(--warning);
  }
  .dns-section-icon[data-tone="danger"] {
    background: white;
    color: var(--danger);
    border: 1.5px solid var(--danger-border);
  }
  .dns-section-icon[data-tone="muted"] {
    background: var(--bg-subtle);
    color: var(--text-secondary);
  }

  .dns-section-cancel {
    margin-left: auto;
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 12.5px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .dns-section-cancel:hover { color: var(--text); }

  .dns-section-body {
    padding: 20px;
  }
  .dns-section-body p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .dns-section[data-state="disconnected"] .dns-section-body p {
    color: #991b1b;
  }
  .dns-section-body p + p { margin-top: 8px; }
  .dns-section-body code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--bg-subtle);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .dns-section[data-state="disconnected"] .dns-section-body code {
    background: rgba(127, 29, 29, 0.08);
  }
  .dns-section-actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Configured-state metadata grid */
  .dns-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    margin-top: 12px;
    font-size: 12.5px;
  }
  .dns-meta dt {
    color: var(--text-muted);
    margin: 0;
  }
  .dns-meta dd {
    color: var(--text);
    margin: 0;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* Inline wizard within the DNS section */
  .dns-wizard {
    display: grid;
    grid-template-columns: 200px 1fr;
    min-height: 380px;
  }
  .dns-wizard-sidebar {
    background: var(--bg-subtle);
    border-right: 1px solid var(--border);
    padding: 18px 12px;
  }
  .dns-wizard-sidebar-eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    padding: 0 10px 8px;
  }
  .dns-wizard-sidebar ul {
    list-style: none;
    margin: 4px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .dns-wizard-sidebar li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 12.5px;
  }
  .dns-wizard-sidebar li[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 500;
    box-shadow: var(--shadow-card);
  }
  .dns-wizard-sidebar li[data-state="complete"] { color: var(--text); }
  .dns-wizard-sidebar li .marker {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8.5px;
    font-weight: 600;
    color: var(--text-faint);
  }
  .dns-wizard-sidebar li[data-state="active"] .marker {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }
  .dns-wizard-sidebar li[data-state="complete"] .marker {
    border-color: var(--success);
    background: var(--success);
    color: white;
    font-size: 0;
  }
  .dns-wizard-sidebar li[data-state="complete"] .marker::before {
    content: "✓";
    font-size: 8.5px;
    font-weight: 700;
  }

  .dns-wizard-content {
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .dns-wizard-content h3 {
    margin: 0 0 6px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .dns-wizard-content > p {
    margin: 0 0 18px;
    color: var(--text-secondary);
    font-size: 13.5px;
  }
  .dns-wizard-content-body {
    flex: 1;
  }
  .dns-wizard-footer {
    border-top: 1px solid var(--border);
    margin-top: 18px;
    padding-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Managed pill on managed-row's DNS section */
  .managed-pill-block {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg-subtle);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
  }

  /* BYO sub-flow shared with onboarding */
  .step-header h2 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .step-header p {
    margin: 0 0 28px;
    color: var(--text-secondary);
    font-size: 14px;
    max-width: 580px;
  }

  .preview-chip {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .preview-chip-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
  }
  .preview-chip-value {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .info-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--info-bg);
    border: 1px solid var(--info-border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: #1e3a8a;
    font-size: 13px;
  }
  .info-banner svg { flex-shrink: 0; color: var(--info); margin-top: 1px; }

  .subdomain-row {
    display: flex;
    align-items: stretch;
  }
  .subdomain-row input {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
    border-right: 0;
    max-width: 180px;
  }
  .subdomain-row .domain-suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-muted);
  }

  .dmarc-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: start;
  }
  .dmarc-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--bg-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
  }
  .dmarc-content h4 {
    margin: 0 0 4px;
    font-size: 14.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dmarc-content p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
  }
  /* Soft warning chip used for the cross-root-domain reply-to nudge */
  .deliverability-chip {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--warning);
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
  }
  .recommended-pill {
    background: var(--bg-subtle);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--text);
    border-radius: 999px;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 4px;
    border: 0;
    padding: 0;
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 18px;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 999px;
    transition: left 120ms ease;
  }
  .toggle[data-on="false"] { background: var(--border-strong); }
  .toggle[data-on="false"]::after { left: 2px; }

  .connect-screen {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 40px;
    align-items: center;
    margin-top: 20px;
  }
  .connect-screen ul {
    list-style: none;
    margin: 16px 0 24px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .connect-screen li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }
  .connect-screen li svg { color: var(--text); flex-shrink: 0; }
  .connect-actions { display: flex; gap: 10px; }
  .connect-fineprint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .connect-art {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .connect-art-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-card);
  }
  .connect-art-card.primary { transform: rotate(-5deg) translateX(20px); z-index: 2; }
  .connect-art-card.secondary {
    transform: rotate(5deg) translateX(-20px);
    border-style: dashed;
    background: transparent;
  }

  .verifying-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .verifying-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .domain-name {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
  }
  .verifying-list { padding: 8px 0; }
  .verifying-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 14px 24px;
  }
  .verifying-row + .verifying-row { border-top: 1px solid var(--bg-subtle); }
  .verifying-icon {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .verifying-icon[data-state="ok"] { background: var(--success-pill-bg); color: var(--success); }
  .verifying-icon[data-state="pending"] {
    background: var(--bg-subtle);
    color: var(--text-faint);
    border: 1.5px dashed var(--border-strong);
  }
  .verifying-icon[data-state="working"] {
    background: var(--info-bg);
    color: var(--info);
  }
  .verifying-row .label { font-weight: 500; font-size: 13.5px; }
  .verifying-row .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .verifying-row .timestamp { font-size: 11.5px; color: var(--text-faint); font-family: var(--font-mono); }
  .verifying-foot {
    padding: 14px 24px;
    background: var(--bg-subtle);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--info);
    border-radius: 999px;
    animation: spin 800ms linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Confirmation modal (remove domain, change default, etc.) */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(2px);
    animation: fadeIn 180ms ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .confirm-modal {
    background: white;
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    max-width: 440px;
    width: 90%;
    box-shadow: var(--shadow-modal);
    animation: pop 220ms ease;
  }
  @keyframes pop { from { transform: scale(0.95); } to { transform: scale(1); } }
  .confirm-modal h2 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  .confirm-modal p {
    font-size: 13.5px;
    color: var(--text-secondary);
    margin: 0 0 20px;
    line-height: 1.55;
  }
  .confirm-modal .actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .confirm-modal code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: var(--bg-subtle);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Entri fake modal */
  .entri-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(2px);
    animation: fadeIn 180ms ease;
  }
  .entri-modal {
    background: white;
    border-radius: var(--radius-lg);
    padding: 32px 36px;
    max-width: 480px;
    width: 90%;
    box-shadow: var(--shadow-modal);
    text-align: center;
    animation: pop 220ms ease;
  }
  .entri-modal-mark {
    width: 56px;
    height: 56px;
    border-radius: 999px;
    background: var(--text);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    font-size: 22px;
    font-weight: 700;
    font-family: var(--font-mono);
  }
  .entri-modal h2 {
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 10px;
  }
  .entri-modal p {
    font-size: 13.5px;
    color: var(--text-secondary);
    margin: 0 0 22px;
    line-height: 1.55;
  }
  .entri-modal .demo-note {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 18px;
    font-style: italic;
  }
  .entri-modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  /* Intro modal: left-aligned, compact, with a close button. */
  .entri-modal-intro {
    max-width: 480px;
    text-align: left;
    position: relative;
    padding: 28px 28px 22px;
  }
  .entri-modal-intro h2 { margin: 0 0 8px; padding-right: 28px; }
  .entri-modal-intro p { margin: 0 0 18px; }
  .entri-modal-intro .entri-modal-actions { justify-content: flex-end; margin-top: 4px; }
  .entri-modal-intro .demo-note { text-align: left; margin-top: 14px; }
  .entri-modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: transparent;
    border: 0;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    line-height: 0;
  }
  .entri-modal-close:hover { color: var(--text); }
  .entri-context-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .entri-context-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .entri-context-list li svg { flex-shrink: 0; margin-top: 2px; color: var(--text-faint, var(--text-muted)); }
  .entri-context-list li strong { color: var(--text); font-weight: 600; }

  /* Phase 2/3: simulated Entri iframe chrome */
  .entri-iframe {
    background: white;
    border-radius: var(--radius-lg);
    width: 92%;
    max-width: 560px;
    box-shadow: var(--shadow-modal, 0 20px 60px rgba(0,0,0,0.25));
    overflow: hidden;
    animation: pop 220ms ease;
    display: flex;
    flex-direction: column;
  }
  .entri-iframe-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .entri-iframe-brand {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }
  .entri-iframe-dot {
    width: 20px; height: 20px;
    border-radius: 999px;
    background: var(--text);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
  }
  .entri-iframe-url {
    margin-left: auto;
    margin-right: 28px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    background: white;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 12px;
  }
  .entri-iframe .entri-modal-close { top: 11px; right: 12px; }
  .entri-iframe-body { padding: 24px; }
  .entri-iframe-provider {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-subtle);
    margin-bottom: 16px;
  }
  .entri-iframe-records { display: flex; flex-direction: column; gap: 8px; }
  .entri-iframe-record {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .entri-iframe-record > span:first-child {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    flex-shrink: 0;
    width: 52px;
    text-align: center;
  }
  .entri-iframe-record code {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entri-iframe-tag {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg-subtle);
    border-radius: 999px;
    padding: 2px 9px;
    flex-shrink: 0;
  }
  .entri-iframe-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-subtle);
  }
  .btn-block { width: 100%; justify-content: center; }

  /* Demo state switcher */
  .demo-switcher {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    z-index: 9999;
    font-size: 12px;
  }
  .demo-switcher-label {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .demo-switcher-options {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;

<script>
/* =========================================================
   STATE
   ========================================================= */
const state = {
  // Active settings tab
  tab: 'email-channel',

  // BYO "Add a domain" flow (only relevant when in Email Channel). Mirrors the
  // onboarding rework: a single details page (no multi-step sub-journey) with
  // the combined prefix@subdomain.root address row, then the 3-phase Entri
  // modal. No paused/resume — it's one page now.
  byo: {
    // 'details' | null  (when 'details', the full-page Add-domain form shows;
    // when inlineForDomainId is set, it renders inside that domain's detail page)
    subStep: null,
    rootDomain: 'evanspetcare.com',
    subdomain: 'send',
    // BYO sender identity, collected on the details page. Seeded from the
    // managed domain on startAddDomain(); editable before Entri launches.
    prefix: 'marketing',
    displayName: "Evan's Pet Care",
    replyTo: 'hello@evanspetcare.com',
    // Which segment of the combined address row is focused, so the helper text
    // below it can explain that part: 'prefix' | 'subdomain' | 'root' | null.
    activeSeg: null,
    verifyProgress: 0,
    isVerifying: false,
    // Whether this flow is for an EXISTING domain on the detail page (inline
    // DNS wizard) vs ADDING a new domain (full-page navigation from list view).
    inlineForDomainId: null,
  },

  // Account-level email metadata (used as defaults when adding new domains)
  email: {
    managedDomain: 'evans-pet-care.sent-mail.com',
  },

  // Master→detail nav within Email Channel: null = list view, otherwise a domain id
  selectedDomainId: null,

  // Pending edits for the currently-open domain detail page (so we can show a
  // sticky save bar scoped to that domain only)
  pendingEdits: null, // { domainId, prefix, displayName, replyTo }

  // Domains list (entry state: 1 verified BYO + always-present managed row)
  // Each domain owns its OWN sender identity (prefix, displayName, replyTo)
  domains: [
    {
      id: 'send',
      fullDomain: 'send.evanspetcare.com',
      purpose: 'Marketing',
      status: 'verified',
      lastVerified: '2 min ago',
      isDefault: true,
      isManaged: false,
      prefix: 'marketing',
      displayName: "Evan's Pet Care",
      replyTo: 'hello@evanspetcare.com',
    },
    {
      id: 'managed',
      fullDomain: 'evans-pet-care.sent-mail.com',
      purpose: 'Managed domain · always available',
      status: 'managed',
      lastVerified: null,
      isDefault: false,
      isManaged: true,
      prefix: 'marketing',
      displayName: "Evan's Pet Care",
      replyTo: 'hello@evanspetcare.com',
    },
  ],

  // Demo scenario
  demoScenario: 'verified-1',

  // Modals
  showEntriModal: false,
  // Entri modal phase: 'intro' | 'iframe' | 'done' (mirrors onboarding)
  entriPhase: 'intro',
  confirmModal: null, // { title, body, confirmLabel, onConfirm }

  // Toast
  toast: null,

  dirty: false, // for save bar visibility
};

const SETTINGS_TABS = [
  { key: 'brand', label: 'Brand Settings' },
  { key: 'business', label: 'Business Information' },
  { key: 'email-channel', label: 'Email Channel' },
  { key: 'sms', label: 'SMS Channel' },
  { key: 'merge-fields', label: 'Merge Fields' },
];

// Single-step "Add a domain" — one details page, then Entri. (Kept as an array
// so the sidebar/marker code can stay generic.)
const BYO_SUBSTEPS = [
  { key: 'details', label: 'Domain details' },
];

const DEMO_SCENARIOS = [
  { key: 'verified-1', label: '1 verified' },
  { key: 'verified-2', label: '2 verified' },
  { key: 'pending', label: 'Verifying' },
  { key: 'disconnected', label: 'Disconnected' },
  { key: 'managed-only', label: 'Managed only' },
];

/* =========================================================
   DEMO SCENARIO LOADER
   ========================================================= */
function loadDemoScenario(key) {
  state.demoScenario = key;
  state.tab = 'email-channel';
  state.selectedDomainId = null;
  state.pendingEdits = null;
  state.byo = { subStep: null, rootDomain: 'evanspetcare.com', subdomain: 'send', prefix: 'marketing', displayName: "Evan's Pet Care", replyTo: 'hello@evanspetcare.com', activeSeg: null, verifyProgress: 0, isVerifying: false, inlineForDomainId: null };
  state.showEntriModal = false;
  state.entriPhase = 'intro';

  // Default identity used for all baseline domains in demo scenarios
  const defaultIdentity = (prefix) => ({
    prefix,
    displayName: "Evan's Pet Care",
    replyTo: 'hello@evanspetcare.com',
  });

  const managed = {
    id: 'managed',
    fullDomain: 'evans-pet-care.sent-mail.com',
    purpose: 'Managed domain · always available',
    status: 'managed',
    lastVerified: null,
    isDefault: false,
    isManaged: true,
    ...defaultIdentity('marketing'),
  };

  if (key === 'verified-1') {
    state.domains = [
      { id: 'send', fullDomain: 'send.evanspetcare.com', purpose: 'Marketing', status: 'verified', lastVerified: '2 min ago', isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      managed,
    ];
  } else if (key === 'verified-2') {
    state.domains = [
      { id: 'send', fullDomain: 'send.evanspetcare.com', purpose: 'Marketing', status: 'verified', lastVerified: '2 hr ago', isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      { id: 'notif', fullDomain: 'notifications.evanspetcare.com', purpose: 'Transactional', status: 'verified', lastVerified: '1 day ago', isDefault: false, isManaged: false, prefix: 'noreply', displayName: "Evan's Pet Care Reminders", replyTo: 'support@evanspetcare.com' },
      managed,
    ];
  } else if (key === 'pending') {
    state.domains = [
      { id: 'send', fullDomain: 'send.evanspetcare.com', purpose: 'Marketing · Verifying 1 of 3 records', status: 'pending', lastVerified: null, isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      managed,
    ];
    // Show a meaningful midway state in the DNS section: DKIM verified, Return-Path checking, DMARC pending
    state.byo.verifyProgress = 1;
  } else if (key === 'disconnected') {
    state.domains = [
      { id: 'send', fullDomain: 'send.evanspetcare.com', purpose: 'Marketing · DKIM record missing', status: 'disconnected', lastVerified: '3 days ago', isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      { id: 'notif', fullDomain: 'notifications.evanspetcare.com', purpose: 'Transactional', status: 'verified', lastVerified: '2 hr ago', isDefault: false, isManaged: false, prefix: 'noreply', displayName: "Evan's Pet Care Reminders", replyTo: 'support@evanspetcare.com' },
      managed,
    ];
  } else if (key === 'managed-only') {
    state.domains = [managed];
  }
  render();
}

/* =========================================================
   NAVIGATION
   ========================================================= */
/* Reply-to helpers: suggest a value derived from the sending domain root,
   and detect cross-root-domain reply-tos for the deliverability nudge. */
function rootDomainOf(host) {
  if (!host) return '';
  const parts = host.split('.').filter(Boolean);
  return parts.length >= 2 ? parts.slice(-2).join('.') : host;
}
function suggestedReplyTo(sendingDomain) {
  const root = rootDomainOf(sendingDomain);
  return root ? `info@${root}` : '';
}
function replyToCrossDomain(replyTo, sendingDomain) {
  if (!replyTo || !replyTo.includes('@') || !sendingDomain) return false;
  const replyHost = replyTo.split('@')[1] || '';
  return rootDomainOf(replyHost) !== rootDomainOf(sendingDomain);
}

/* BYO details: all five fields are required before connecting with Entri —
   the three address segments plus display name and reply-to. (Mirrors
   onboarding.) */
function byoRequiredFilled() {
  const b = state.byo;
  return b.prefix.trim() && b.subdomain.trim() && b.rootDomain.trim() && b.displayName.trim() && b.replyTo.trim();
}

/* Contextual helper for the combined address row — describes whichever segment
   is focused, falling back to the full-address summary. (Mirrors onboarding.) */
function addressSegHelper() {
  const b = state.byo;
  const full = `${b.prefix || 'hello'}@${b.subdomain || 'send'}.${b.rootDomain || 'yourdomain.com'}`;
  switch (b.activeSeg) {
    case 'prefix':
      return `<strong>Alias</strong> — the inbox name before the <code>@</code>. Common choices: <code>hello</code>, <code>marketing</code>, <code>news</code>.`;
    case 'subdomain':
      return `<strong>Subdomain</strong> — a brand-new prefix on your domain, used only for sending. Common choices: <code>send</code>, <code>email</code>, <code>mail</code>. Pick one you're not already using.`;
    case 'root':
      return `<strong>Your domain</strong> — the domain customers know you by, usually the same as your website.`;
    default:
      return `This is the full address it'll send from: <code>${full}</code>`;
  }
}

function setTab(key) {
  state.tab = key;
  state.byo.subStep = null;
  state.byo.activeSeg = null;
  state.selectedDomainId = null;
  state.pendingEdits = null;
  render();
}

/* =========================================================
   DOMAIN ACTIONS
   ========================================================= */
function startAddDomain() {
  state.byo.subStep = 'details';
  state.byo.activeSeg = null;
  state.byo.inlineForDomainId = null;
  state.byo.subdomain = state.domains.length === 1 ? 'send' : 'notifications';
  // Seed BYO sender identity from the managed domain so the user starts from a
  // sensible default. They can edit any of these before Entri launches. Reply-to
  // is suggested on the new root domain (not copied from the managed reply-to).
  const managed = state.domains.find(d => d.isManaged);
  if (managed) {
    state.byo.prefix = managed.prefix;
    state.byo.displayName = managed.displayName;
  }
  state.byo.replyTo = suggestedReplyTo(`${state.byo.subdomain}.${state.byo.rootDomain}`);
  render();
}

function reverify(id) {
  state.toast = { kind: 'info', text: 'Re-checking DNS records…' };
  render();
  setTimeout(() => {
    const d = state.domains.find(x => x.id === id);
    if (d) {
      d.status = 'verified';
      d.lastVerified = 'just now';
      d.purpose = d.purpose.replace(' · DKIM record missing', '').replace(/ · Verifying.*$/, '');
    }
    state.toast = { kind: 'success', text: 'Verified successfully.' };
    render();
    setTimeout(() => { state.toast = null; render(); }, 2400);
  }, 1400);
}

function setDefault(id) {
  state.domains.forEach(d => { d.isDefault = (d.id === id); });
  state.toast = { kind: 'success', text: 'Default domain updated.' };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2400);
}

function confirmRemove(id) {
  const d = state.domains.find(x => x.id === id);
  if (!d) return;
  state.confirmModal = {
    title: `Remove ${d.fullDomain}?`,
    body: `This deletes the domain from your ESP and removes its records from your settings. ${d.isDefault ? 'Another domain will be promoted to default.' : ''}`,
    confirmLabel: 'Remove domain',
    onConfirm: () => {
      const wasDefault = d.isDefault;
      state.domains = state.domains.filter(x => x.id !== id);
      if (wasDefault) {
        const next = state.domains.find(x => !x.isManaged);
        if (next) next.isDefault = true;
      }
      // If we removed the domain we were viewing in detail, pop back to the list
      if (state.selectedDomainId === id) {
        state.selectedDomainId = null;
        state.pendingEdits = null;
      }
      state.confirmModal = null;
      state.toast = { kind: 'success', text: `${d.fullDomain} removed.` };
      render();
      setTimeout(() => { state.toast = null; render(); }, 2400);
    },
  };
  render();
}

function reconnectDisconnected(id) {
  const d = state.domains.find(x => x.id === id);
  if (!d) return;
  // Re-launch the connect flow inline on the domain detail page (Voice pattern).
  // Pre-populates subdomain/root from the existing domain so the user starts
  // already inside the wizard at sub-step 1 with their values filled in.
  state.byo.subdomain = d.fullDomain.split('.')[0];
  state.byo.rootDomain = d.fullDomain.split('.').slice(1).join('.');
  state.byo.prefix = d.prefix;
  state.byo.displayName = d.displayName;
  state.byo.replyTo = d.replyTo;
  state.byo.subStep = 'details';
  state.byo.activeSeg = null;
  state.byo.inlineForDomainId = id;
  // Make sure the user is on this domain's detail page so the inline wizard renders
  state.selectedDomainId = id;
  render();
}

/* Start the inline DNS wizard from the detail page's DNS splash CTA.
   Used when the user is on a domain detail page that has no DNS connection yet
   (today, only the managed domain when shown in 'splash' state — but reserved
   for any future scenario where a row exists without DNS connection started). */
function startInlineDnsWizard(domainId) {
  const d = state.domains.find(x => x.id === domainId);
  if (!d) return;
  state.byo.subdomain = 'send';
  state.byo.rootDomain = 'evanspetcare.com';
  state.byo.prefix = d.prefix || 'marketing';
  state.byo.displayName = d.displayName || "Evan's Pet Care";
  state.byo.replyTo = d.replyTo || suggestedReplyTo('send.evanspetcare.com');
  state.byo.subStep = 'details';
  state.byo.activeSeg = null;
  state.byo.inlineForDomainId = domainId;
  state.selectedDomainId = domainId;
  render();
}

/* Cancel the inline DNS wizard — drops back to whatever the section's
   pre-wizard state was (configured, disconnected, splash). Does NOT
   navigate away from the detail page. */
function cancelInlineDnsWizard() {
  state.byo.subStep = null;
  state.byo.activeSeg = null;
  state.byo.inlineForDomainId = null;
  state.byo.isVerifying = false;
  state.byo.verifyProgress = 0;
  render();
}

/* Disconnect a verified domain — sets status to disconnected and shows
   the disconnected-state DNS section. Confirmation modal first. */
function confirmDisconnect(id) {
  const d = state.domains.find(x => x.id === id);
  if (!d) return;
  state.confirmModal = {
    title: `Disconnect ${d.fullDomain}?`,
    body: `Outbound mail will fall back to the managed domain until DNS is reconnected. The domain row stays in your list — you can reconnect anytime from this page.`,
    confirmLabel: 'Disconnect DNS',
    onConfirm: () => {
      d.status = 'disconnected';
      d.lastVerified = 'just now';
      d.purpose = d.purpose.split(' · ')[0] + ' · DKIM record missing';
      state.confirmModal = null;
      state.toast = { kind: 'info', text: `${d.fullDomain} disconnected.` };
      render();
      setTimeout(() => { state.toast = null; render(); }, 2400);
    },
  };
  render();
}

/* =========================================================
   BYO SUB-JOURNEY
   ========================================================= */
/* Cancel the full-page "Add a domain" flow → back to the Email Channel list. */
function cancelAddDomain() {
  state.byo.subStep = null;
  state.byo.activeSeg = null;
  state.byo.isVerifying = false;
  render();
}

/* =========================================================
   ENTRI MODAL — 3 phases (intro → iframe → done), no auto-flip
   ---------------------------------------------------------
   Mirrors onboarding. On "done" close (entriFinish) the target domain is left
   in a 'verifying' state (spinner) — DNS propagation is genuinely pending, so
   we never auto-flip to verified.
   ========================================================= */
function openEntri() {
  if (!byoRequiredFilled()) return;
  state.showEntriModal = true;
  state.entriPhase = 'intro';
  render();
}

function launchEntriIframe() {
  state.entriPhase = 'iframe';
  render();
}

/* Sign in & publish — advance the modal to the "done" phase and mark the
   target domain verifying behind the scenes (no auto-flip animation). */
function entriSuccess() {
  state.entriPhase = 'done';

  if (state.byo.inlineForDomainId) {
    // Existing domain (reconnect / inline setup) — mutate it in place.
    const d = state.domains.find(x => x.id === state.byo.inlineForDomainId);
    if (d) {
      d.status = 'verifying';
      d.lastVerified = null;
      d.purpose = d.purpose.replace(' · DKIM record missing', '').split(' · ')[0];
    }
  } else {
    // New domain — add it to the list now (so it's there once the modal
    // closes), in the verifying state.
    const fullDomain = `${state.byo.subdomain}.${state.byo.rootDomain}`;
    if (!state.domains.some(d => d.fullDomain === fullDomain)) {
      const hasOtherByo = state.domains.some(d => !d.isManaged);
      const newDomain = {
        id: `${state.byo.subdomain}-${state.domains.length}`,
        fullDomain,
        purpose: hasOtherByo ? 'Transactional' : 'Marketing',
        status: 'verifying',
        lastVerified: null,
        isDefault: !hasOtherByo,
        isManaged: false,
        prefix: state.byo.prefix || 'marketing',
        displayName: state.byo.displayName || '',
        replyTo: state.byo.replyTo || suggestedReplyTo(fullDomain),
      };
      const managedIdx = state.domains.findIndex(d => d.isManaged);
      state.domains.splice(managedIdx === -1 ? state.domains.length : managedIdx, 0, newDomain);
      state.byo.lastAddedId = newDomain.id;
    }
  }
  render();
}

/* Close the "done" modal → hand control back to our app. Land on the relevant
   place with the domain showing its verifying state. */
function entriFinish() {
  state.showEntriModal = false;
  state.entriPhase = 'intro';
  const inlineId = state.byo.inlineForDomainId;
  state.byo.subStep = null;
  state.byo.inlineForDomainId = null;
  state.byo.isVerifying = false;
  if (inlineId) {
    // Inline flow — stay on that domain's detail page.
    state.selectedDomainId = inlineId;
  } else {
    // New domain added from the list — return to the list to show the new row.
    state.selectedDomainId = null;
  }
  state.toast = { kind: 'info', text: 'Records published — verifying DNS.' };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2800);
}

/* User closed the Entri modal before completing — just dismiss it. Leaves the
   user on the details form (or detail-page wizard) to try again. */
function entriClose() {
  state.showEntriModal = false;
  state.entriPhase = 'intro';
  render();
}

function byoSidebar() {

        Email Channel
      </button>
      <ul class="shell-sidebar-substeps">
        <li data-state="${verifying ? 'complete' : 'active'}">
          <span class="shell-sidebar-substep-marker">${verifying ? '' : '1'}</span>
          Domain details
        </li>
        <li data-state="${verifying ? 'active' : 'upcoming'}">
          <span class="shell-sidebar-substep-marker">2</span>
          Verifying
        </li>
      </ul>

}

/* =========================================================
   PAGES
   ========================================================= */
function emailChannelPage() {
  return `
    ${settingsSidebar()}
    <main class="shell-main">
      <div class="page-header">
        <h1>Email Channel</h1>
        <p>Manage the domains your messages send from. Each domain has its own sender identity — click a domain to configure its prefix, display name, and reply-to.</p>
      </div>

      <div class="section-block">
        <div class="section-block-header">
          <h3>Sending domains</h3>
          <button class="btn btn-secondary" onclick="startAddDomain()">+ Add domain</button>
        </div>

        ${renderDomainTable()}

        <p style="margin-top: 14px; font-size: 12.5px; color: var(--text-muted);">The default domain is used for all Engage broadcasts unless overridden on a specific automation or campaign. Click any row to configure its sender identity and DNS connection.</p>
      </div>
    </main>
  `;
}

/* Per-domain detail page — master→detail navigation from the domain table */
function emailChannelDomainDetailPage(domainId) {
  const d = state.domains.find(x => x.id === domainId);
  if (!d) {
    state.selectedDomainId = null;
    return emailChannelPage();
  }

  // Pending edits live separately so we can show a sticky save bar
  // scoped to this domain only. We initialize them lazily.
  if (!state.pendingEdits || state.pendingEdits.domainId !== domainId) {
    state.pendingEdits = {
      domainId,
      prefix: d.prefix,
      displayName: d.displayName,
      replyTo: d.replyTo,
    };
  }
  const edits = state.pendingEdits;
  const dirty = edits.prefix !== d.prefix || edits.displayName !== d.displayName || edits.replyTo !== d.replyTo;

  // Header status pill
  const pillClass = (d.status === 'pending' || d.status === 'verifying') ? 'status-pending' : `status-${d.status}`;
  const pillLabel = d.status === 'verified' ? 'Verified'
    : (d.status === 'pending' || d.status === 'verifying') ? 'Verifying'
    : d.status === 'disconnected' ? 'Disconnected'
    : 'Managed';

  const showVia = d.isManaged;

  return `
    ${settingsSidebar()}
    <main class="shell-main">
      <button class="btn-link" style="font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; display: inline-flex; align-items: center; gap: 6px;" onclick="closeDomainDetail()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2L3 6l4 4"/></svg>
        Email Channel
      </button>

      <div class="page-header" style="margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
          <h1 style="margin: 0; font-family: var(--font-mono); font-size: 18px;">${d.fullDomain}</h1>
          <span class="status-pill ${pillClass}">${pillLabel}</span>
          ${d.isDefault ? '<span class="default-badge">Default</span>' : ''}
          ${d.isManaged ? '<span class="default-badge" style="background: var(--bg-subtle); color: var(--text-secondary);">Managed</span>' : ''}
        </div>
        <p style="margin-top: 6px;">${d.purpose}${d.lastVerified ? ` · Last verified ${d.lastVerified}` : ''}</p>
      </div>

      <!-- Section 1: Sender identity (flat form) -->
      <div class="section-block">
        <h3 class="section-block-title">Sender identity</h3>

        <div class="form-group">
          <label>Sending email address</label>
          <span class="helper">Edit the prefix to match your team — common choices: <code>marketing</code>, <code>hello</code>, <code>news</code>, <code>noreply</code></span>
          <div class="sender-prefix-row">
            <input class="form-input" type="text" value="${edits.prefix}" data-focus-key="detail.prefix"
              oninput="state.pendingEdits.prefix=this.value; render();" />
            <span class="at-sign">@</span>
            <span class="domain-suffix">${d.fullDomain}</span>
          </div>
        </div>

        <div class="form-group">
          <label>Display name</label>
          <span class="helper">What customers see in their inbox before the email opens.</span>
          <input class="form-input" type="text" value="${edits.displayName}" data-focus-key="detail.displayName"
            oninput="state.pendingEdits.displayName=this.value; render();" />
        </div>

        <div class="form-group">
          <label>Reply-to email</label>
          <span class="helper">For best deliverability, use an address on the same root domain as your sending domain.</span>
          <input class="form-input" type="email" placeholder="${suggestedReplyTo(d.fullDomain)}" value="${edits.replyTo}" data-focus-key="detail.replyTo"
            oninput="state.pendingEdits.replyTo=this.value; render();" />
          ${replyToCrossDomain(edits.replyTo, d.fullDomain) ? `
            <span class="deliverability-chip">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L1 14h14L8 2z"/><path d="M8 6v3M8 11h.01"/></svg>
              Reply-to on a different root domain can hurt deliverability
            </span>
          ` : ''}
        </div>

        <div style="margin-top: 20px;">
          <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:10px;">How it appears in inbox</div>
          <div class="inbox-preview">
            <div class="inbox-row">
              <div class="inbox-avatar">${(edits.displayName || 'E').charAt(0).toUpperCase()}</div>
              <div class="inbox-meta">
                <div class="inbox-from">
                  ${edits.displayName || 'Your business'}
                  ${showVia ? `<span class="inbox-via">via <strong style="color:var(--warning);">${d.fullDomain}</strong></span>` : ''}
                </div>
                <div class="inbox-subject">${edits.prefix || 'hello'}@${d.fullDomain} · Your dog's grooming is booked for Saturday</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Section 2: DNS connection (Voice-style splash/configured/disconnected/wizard) -->
      <div class="section-block">
        <div class="section-block-header">
          <h3>DNS connection</h3>
          ${!d.isManaged && d.status === 'verified' && !d.isDefault ? `<button class="btn btn-secondary" onclick="setDefault('${d.id}')">Set as default</button>` : ''}
        </div>
        ${renderDnsSection(d)}
      </div>

      ${!d.isManaged ? `
        <!-- Danger zone for non-managed domains -->
        <div class="section-block">
          <h3 class="section-block-title">Danger zone</h3>
          <div style="display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius);">
            <div>
              <div style="font-size: 13.5px; font-weight: 500;">Remove this domain</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">Deletes the domain from your ESP and removes its records from your settings.</div>
            </div>
            <button class="btn btn-danger" onclick="confirmRemove('${d.id}')">Remove domain</button>
          </div>
        </div>
      ` : ''}

      ${dirty ? `
        <div class="save-bar">
          <span class="dirty-text">You have unsaved sender identity changes for <code style="font-family:var(--font-mono);font-size:12px;">${d.fullDomain}</code>.</span>
          <div style="display:flex; gap:10px;">
            <button class="btn btn-ghost" onclick="discardDomainEdits()">Discard</button>
            <button class="btn btn-primary" onclick="saveDomainEdits()">Save changes</button>
          </div>
        </div>
      ` : ''}
    </main>
  `;
}

/* DNS connection section — Voice-style splash/configured/disconnected/wizard.
   Returns one of four variants based on the domain's state and whether the
   inline wizard is currently open for THIS domain. */
function renderDnsSection(d) {
  // Inline wizard takes precedence over any other state
  const isInlineWizardForThis = state.byo.inlineForDomainId === d.id && state.byo.subStep;
  const isInlineVerifyingForThis = state.byo.inlineForDomainId === d.id && state.byo.isVerifying;

  if (isInlineWizardForThis) return renderDnsSectionWizard(d);
  if (isInlineVerifyingForThis) return renderDnsSectionVerifying(d);

  if (d.isManaged) return renderDnsSectionManaged(d);
  if (d.status === 'pending' || d.status === 'verifying') return renderDnsSectionVerifying(d);
  if (d.status === 'disconnected') return renderDnsSectionDisconnected(d);
  if (d.status === 'verified') return renderDnsSectionConfigured(d);

  return '';
}

/* Variant: managed domain — DNS is platform-managed, nothing for tenant to configure */
function renderDnsSectionManaged(d) {
  return `
    <div class="dns-section">
      <div class="dns-section-header">
        <span class="dns-section-icon" data-tone="muted">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg>
        </span>
        <span class="dns-section-title">Managed by the platform</span>
        <span class="managed-pill-block" style="margin-left: auto;">No DNS setup needed</span>
      </div>
      <div class="dns-section-body">
        <p>This is your always-available managed domain. DNS records are signed automatically by the platform — there's nothing for you to configure here.</p>
        <p>Mail sent from this domain shows "via <code>${d.fullDomain}</code>" in some inboxes. To remove that, connect a custom domain on a different row.</p>
      </div>
    </div>
  `;
}

/* Variant: configured (verified BYO domain) — show summary + actions */
function renderDnsSectionConfigured(d) {
  return `
    <div class="dns-section">
      <div class="dns-section-header">
        <span class="dns-section-icon" data-tone="success">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3L13 4.5"/></svg>
        </span>
        <span class="dns-section-title">DNS connected</span>
        <span style="margin-left: auto; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);">last verified ${d.lastVerified || 'just now'}</span>
      </div>
      <div class="dns-section-body">
        <p>Outbound mail is DKIM-signed under your domain. Recipients see emails as coming from <code>${d.fullDomain}</code> — no platform tag.</p>
        <dl class="dns-meta">
          <dt>DKIM</dt><dd>Verified</dd>
          <dt>Return-Path</dt><dd>pm-bounces.${d.fullDomain.split('.')[0]}</dd>
          <dt>DMARC</dt><dd>v=DMARC1; p=none</dd>
        </dl>
        <div class="dns-section-actions">
          <button class="btn btn-secondary" onclick="reverify('${d.id}')">Re-verify DNS</button>
          <button class="btn btn-secondary" onclick="reconnectDisconnected('${d.id}')">Reconfigure</button>
        </div>
        <div style="margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 12.5px; color: var(--text-muted); line-height: 1.55;">
          <strong style="color: var(--text); font-weight: 600;">Need to disconnect?</strong>
          To take this domain offline, remove the DKIM TXT record from your DNS provider. Once it's removed, this domain will move to a Disconnected state here and outbound mail will fall back to the managed domain.
        </div>
      </div>
    </div>
  `;
}

/* Variant: disconnected — red treatment, urgent CTAs */
function renderDnsSectionDisconnected(d) {
  return `
    <div class="dns-section" data-state="disconnected">
      <div class="dns-section-header">
        <span class="dns-section-icon" data-tone="danger">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L1 14h14L8 2z"/><path d="M8 7v3M8 12h.01"/></svg>
        </span>
        <span class="dns-section-title">DNS disconnected</span>
        <span style="margin-left: auto; font-size: 12px; color: #991b1b; font-family: var(--font-mono);">last verified ${d.lastVerified || 'unknown'}</span>
      </div>
      <div class="dns-section-body">
        <p><strong>The DKIM record is missing from your DNS.</strong> Outbound mail from this domain is failing authentication and falling back to the managed domain. Deliverability may drop until reconnected.</p>
        <div class="dns-section-actions">
          <button class="btn btn-primary" style="background: var(--danger);" onclick="reconnectDisconnected('${d.id}')">Reconnect DNS</button>
          <button class="btn btn-secondary" onclick="alert('Demo: would show the missing DNS records and a shareable link to forward to IT')">Forward fix to IT</button>
        </div>
      </div>
    </div>
  `;
}

/* Variant: verifying — static "records published, now propagating" state.
   No auto-flip (DNS propagation is genuinely pending); the user can re-check. */
function renderDnsSectionVerifying(d) {
  const label = d.fullDomain.split('.')[0];
  const row = (title, type, host) => `
    <div class="verifying-row">
      <div class="verifying-icon" data-state="working"><div class="spinner" style="border-top-color: var(--info);"></div></div>
      <div>
        <div class="label">${title}</div>
        <div class="desc">${type} for <code style="font-family:var(--font-mono);font-size:11.5px;">${host}</code></div>
      </div>
      <span class="timestamp">checking…</span>
    </div>`;

  return `
    <div class="dns-section" data-state="pending">
      <div class="dns-section-header">
        <span class="dns-section-icon" data-tone="info">
          <div class="spinner" style="width: 12px; height: 12px;"></div>
        </span>
        <span class="dns-section-title">Verifying DNS records</span>
        <span style="margin-left: auto; font-size: 12px; color: var(--text-muted);">usually 1–5 minutes</span>
      </div>
      <div class="dns-section-body" style="padding: 0;">
        <div class="verifying-list" style="padding: 4px 0;">
          ${row('DKIM signing key', 'TXT record', `_domainkey.${label}`)}
          ${row('Return-Path', 'CNAME', `pm-bounces.${label}`)}
          ${row('DMARC policy', 'TXT record', `_dmarc.${label}`)}
        </div>
        <div class="dns-section-actions" style="padding: 0 18px 18px;">
          <button class="btn btn-secondary" onclick="reverify('${d.id}')">Check now</button>
        </div>
      </div>
    </div>
  `;
}
