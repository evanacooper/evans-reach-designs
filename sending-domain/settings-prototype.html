/* =========================================================
   DOMAIN DETAIL ACTIONS
   ========================================================= */
function openDomainDetail(id) {
  state.selectedDomainId = id;
  state.pendingEdits = null; // will be lazily initialized in the page
  render();
}

function closeDomainDetail() {
  // If there are unsaved edits, confirm before bailing
  if (state.pendingEdits) {
    const d = state.domains.find(x => x.id === state.pendingEdits.domainId);
    if (d) {
      const dirty = state.pendingEdits.prefix !== d.prefix || state.pendingEdits.displayName !== d.displayName || state.pendingEdits.replyTo !== d.replyTo;
      if (dirty && !confirm('You have unsaved changes. Discard them?')) {
        return;
      }
    }
  }
  // Also cancel any in-flight inline DNS wizard for this domain
  if (state.byo.inlineForDomainId === state.selectedDomainId) {
    state.byo.subStep = null;
    state.byo.inlineForDomainId = null;
    state.byo.isVerifying = false;
  }
  state.selectedDomainId = null;
  state.pendingEdits = null;
  render();
}

function discardDomainEdits() {
  if (!state.pendingEdits) return;
  const d = state.domains.find(x => x.id === state.pendingEdits.domainId);
  if (d) {
    state.pendingEdits = {
      domainId: d.id,
      prefix: d.prefix,
      displayName: d.displayName,
      replyTo: d.replyTo,
    };
  }
  render();
}

function saveDomainEdits() {
  if (!state.pendingEdits) return;
  const d = state.domains.find(x => x.id === state.pendingEdits.domainId);
  if (!d) return;
  d.prefix = state.pendingEdits.prefix;
  d.displayName = state.pendingEdits.displayName;
  d.replyTo = state.pendingEdits.replyTo;
  state.toast = { kind: 'success', text: `${d.fullDomain} sender identity saved.` };
  // Reset pending so the save bar disappears
  state.pendingEdits = {
    domainId: d.id,
    prefix: d.prefix,
    displayName: d.displayName,
    replyTo: d.replyTo,
  };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2400);
}

function renderDisconnectBanners() {
  const disconnected = state.domains.filter(d => d.status === 'disconnected');
  if (disconnected.length === 0) return '';
  return disconnected.map(d => `
    <div class="disconnect-banner">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 22h20L12 2z"/><path d="M12 9v5M12 18h.01"/></svg>
      <div style="flex: 1;">
        <h4>${d.fullDomain} is no longer verified</h4>
        <p>The DKIM record is missing from your DNS. Your campaigns are temporarily falling back to <code>${state.email.managedDomain}</code> — deliverability may drop.</p>
        <div class="actions">
          <button class="btn btn-primary" style="background: var(--danger); padding: 7px 12px; font-size: 13px;" onclick="reconnectDisconnected('${d.id}')">Reconnect domain</button>
          <button class="btn-link" style="color: var(--danger);" onclick="alert('Demo: would show the missing DNS records and a shareable link to send to IT')">Forward fix to IT</button>
        </div>
      </div>
    </div>
  `).join('');
}

function renderDomainTable() {
  return `
    <table class="domain-table">
      <thead>
        <tr>
          <th>Domain</th>
          <th>Status</th>
          <th>Last verified</th>
          <th style="text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody>
        ${state.domains.map(d => renderDomainRow(d)).join('')}
      </tbody>
    </table>
  `;
}

function renderDomainRow(d) {
  const pillClass = (d.status === 'pending' || d.status === 'verifying') ? 'status-pending' : `status-${d.status}`;
  const pillLabel = d.status === 'verified' ? 'Verified'
    : (d.status === 'pending' || d.status === 'verifying') ? 'Verifying'
    : d.status === 'disconnected' ? 'Disconnected'
    : 'Managed';
  const rowStyle = d.status === 'disconnected' ? 'background: var(--danger-bg); cursor: pointer;' : 'cursor: pointer;';

  // Default-badge composes a star + "Default" label so the star and the
  // word "Default" are visibly bound together. On hover the star icon
  // shows a "Set as default" tooltip and is clickable for non-default rows.
  const chevron = `<span class="row-chevron" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg></span>`;

  let defaultControl = '';
  if (d.isDefault) {
    defaultControl = `
      <span class="default-pill" title="Default sending domain — used unless overridden on a specific automation or campaign">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2 5 5 .5-3.7 3.5L13 15l-5-2.5L3 15l1.7-4.5L1 6.5l5-.5z"/></svg>
        Default
      </span>
    `;
  } else if (!d.isManaged && d.status === 'verified') {
    defaultControl = `
      <button class="default-pill default-pill--action" onclick="event.stopPropagation(); setDefault('${d.id}')" title="Set as default sending domain">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1l2 5 5 .5-3.7 3.5L13 15l-5-2.5L3 15l1.7-4.5L1 6.5l5-.5z"/></svg>
        Set as default
      </button>
    `;
  }

  // Remove is the only action that stays in the actions column; star moved
  // into the name cell, re-verify/reconfigure live on the detail page.
  let actions;
  if (d.isManaged) {
    actions = `<div class="actions"><span style="font-size:12px; color:var(--text-faint);">Always available</span>${chevron}</div>`;
  } else {
    const removeBtn = `<button class="icon-btn" onclick="event.stopPropagation(); confirmRemove('${d.id}')" title="Remove" style="color:var(--danger);"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V2.5h4V4M5 4l1 9h4l1-9"/></svg></button>`;
    actions = `<div class="actions">${removeBtn}${chevron}</div>`;
  }

  // Compose the per-row "from" line for hover/scan: prefix@fullDomain · displayName
  const senderSummary = `${d.prefix}@${d.fullDomain}`;

  return `
    <tr style="${rowStyle}" data-disconnected="${d.status === 'disconnected'}" onclick="openDomainDetail('${d.id}')">
      <td>
        <div class="domain-name-cell">
          <span class="name" style="${d.isManaged ? 'color: var(--text-muted);' : ''}">
            ${d.fullDomain}
            ${defaultControl}
          </span>
          <span class="purpose" style="font-family: var(--font-mono); font-size: 11.5px; color: var(--text-muted);">${senderSummary}</span>
          <span class="purpose" style="margin-top: 2px;">${d.purpose} · ${d.displayName}</span>
        </div>
      </td>
      <td><span class="status-pill ${pillClass}">${pillLabel}</span></td>
      <td style="color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;">${d.lastVerified || '—'}</td>
      <td>${actions}</td>
    </tr>
  `;
}

/* BYO SUB-FLOW SCREENS (settings flavor) */
/* Single-page "Add a domain" details form — mirrors the onboarding BYO details
   page: combined prefix@subdomain.root address row with dynamic helper, all
   fields required, inbox preview, and Connect with Entri in the body. */
function byoDetailsPage() {
  const b = state.byo;
  const fullSendingDomain = `${b.subdomain}.${b.rootDomain}`;
  const replyToPlaceholder = suggestedReplyTo(fullSendingDomain);
  const replyToWarn = replyToCrossDomain(b.replyTo, fullSendingDomain);
  const canConnect = byoRequiredFilled();

  return `
    <main class="shell-main">
      <div class="shell-main-narrow">
        <div class="step-header">
          <h2>Set up your sending domain</h2>
          <p>We'll create a brand-new subdomain just for sending email, then Entri publishes the records that authorize it. Fill in the details below and connect.</p>
        </div>

        <!-- Combined sending address: prefix @ subdomain . root domain -->
        <div class="form-group">
          <label>Your sending subdomain<span class="req-asterisk">*</span></label>
          <div class="address-row" data-active="${b.activeSeg || ''}">
            <input class="seg-prefix" type="text" value="${b.prefix}" placeholder="hello" aria-label="Email alias" data-focus-key="byo.prefix"
              onfocus="state.byo.activeSeg='prefix'; render();"
              oninput="state.byo.activeSeg='prefix'; state.byo.prefix=this.value; render();" />
            <span class="address-sep">@</span>
            <input class="seg-subdomain" type="text" value="${b.subdomain}" placeholder="send" aria-label="Sending subdomain" data-focus-key="byo.subdomain"
              onfocus="state.byo.activeSeg='subdomain'; render();"
              oninput="state.byo.activeSeg='subdomain'; state.byo.subdomain=this.value; render();" />
            <span class="address-sep">.</span>
            <input class="seg-root" type="text" value="${b.rootDomain}" placeholder="yourdomain.com" aria-label="Your domain" data-focus-key="byo.rootDomain"
              onfocus="state.byo.activeSeg='root'; render();"
              oninput="state.byo.activeSeg='root'; state.byo.rootDomain=this.value; render();" />
          </div>
          <span class="helper address-seg-helper" data-active="${b.activeSeg || ''}">${addressSegHelper()}</span>
        </div>

        <div class="form-group">
          <label>Display name<span class="req-asterisk">*</span></label>
          <span class="helper">What customers see in their inbox before the email opens.</span>
          <input class="form-input" type="text" value="${b.displayName}" data-focus-key="byo.displayName"
            onfocus="state.byo.activeSeg=null; render();"
            oninput="state.byo.displayName=this.value; render();" />
        </div>

        <div class="form-group">
          <label>Reply-to email<span class="req-asterisk">*</span></label>
          <span class="helper">For best deliverability, use an address on the same root domain as your sending domain.</span>
          <input class="form-input" type="email" placeholder="${replyToPlaceholder}" value="${b.replyTo}" data-focus-key="byo.replyTo"
            onfocus="state.byo.activeSeg=null; render();"
            oninput="state.byo.replyTo=this.value; render();" />
          ${replyToWarn ? `
            <span class="deliverability-chip">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L1 14h14L8 2z"/><path d="M8 6v3M8 11h.01"/></svg>
              Reply-to on a different root domain can hurt deliverability
            </span>
          ` : ''}
        </div>

        <!-- Inbox preview -->
        <div style="margin-top: 24px;">
          <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:10px;">How it appears in inbox</div>
          <div class="inbox-preview">
            <div class="inbox-row">
              <div class="inbox-avatar">${(b.displayName || 'E').charAt(0).toUpperCase()}</div>
              <div class="inbox-meta">
                <div class="inbox-from">${b.displayName || 'Your business'}</div>
                <div class="inbox-subject">${b.prefix || 'hello'}@${fullSendingDomain} · Your dog's grooming is booked for Saturday</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Connect action (opens the Entri modal) -->
        <div style="margin-top: 24px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <button class="btn btn-primary" ${canConnect ? '' : 'disabled'} onclick="openEntri()">Connect with Entri →</button>
          ${canConnect ? '' : `<span style="font-size:12.5px; color:var(--text-muted);">Fill in all fields to continue.</span>`}
        </div>
        <p style="text-align:left; margin-top:14px; font-size:12.5px; color:var(--text-muted);">By selecting "Connect with Entri" you agree to Entri's Terms of Service and Privacy Policy.</p>
      </div>
    </main>
  `;
}

function byoVerifyingScreen() {
  const p = state.byo.verifyProgress;
  const dkimState = p >= 1 ? 'ok' : (p === 0 ? 'working' : 'pending');
  const rpState = p >= 2 ? 'ok' : (p === 1 ? 'working' : 'pending');
  const dmarcState = p >= 3 ? 'ok' : (p === 2 ? 'working' : 'pending');

  const renderIcon = (st) => {
    if (st === 'ok') return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5l2.5 2.5L10 3.5"/></svg>`;
    if (st === 'working') return `<div class="spinner" style="border-top-color: var(--info);"></div>`;
    return '';
  };
  const renderLabel = (st) => st === 'ok' ? 'verified just now' : (st === 'working' ? 'checking…' : 'pending');

  return `
    <main class="shell-main">
      <div class="step-header">
        <h2>Verifying your domain</h2>
        <p>Entri is publishing your DNS records. We'll be notified the moment each one propagates worldwide. This usually takes 1–5 minutes.</p>
      </div>
      <div style="max-width: 640px;">
        <div class="verifying-card">
          <div class="verifying-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);"><path d="M12 2v6m0 8v6M2 12h6m8 0h6M5 5l4 4m6 6l4 4M5 19l4-4m6-6l4-4"/></svg>
            <span class="domain-name">${state.byo.subdomain}.${state.byo.rootDomain}</span>
            <span class="status-pill status-pending" style="margin-left:auto;">Verifying</span>
          </div>
          <div class="verifying-list">
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${dkimState}">${renderIcon(dkimState)}</div>
              <div>
                <div class="label">DKIM signing key</div>
                <div class="desc">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_domainkey.${state.byo.subdomain}</code></div>
              </div>
              <span class="timestamp">${renderLabel(dkimState)}</span>
            </div>
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${rpState}">${renderIcon(rpState)}</div>
              <div>
                <div class="label">Return-Path</div>
                <div class="desc">CNAME for <code style="font-family:var(--font-mono);font-size:11.5px;">pm-bounces.${state.byo.subdomain}</code></div>
              </div>
              <span class="timestamp">${renderLabel(rpState)}</span>
            </div>
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${dmarcState}">${renderIcon(dmarcState)}</div>
              <div>
                <div class="label">DMARC policy</div>
                <div class="desc">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_dmarc.${state.byo.subdomain}</code></div>
              </div>
              <span class="timestamp">${renderLabel(dmarcState)}</span>
            </div>
          </div>
          <div class="verifying-foot">
            ${p < 3 ? `<div class="spinner"></div><span>You can leave this page — we'll update once verification finishes.</span>` : `<span style="color:var(--success); font-weight:500;">All records verified.</span>`}
          </div>
        </div>
      </div>
      <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 16px; padding-top: 24px; border-top: 1px solid var(--border);">
        <button class="btn btn-secondary" onclick="state.byo.isVerifying=false; state.byo.subStep=null; render();">Continue verifying in background</button>
      </div>
    </main>
  `;
}

/* OTHER TABS (placeholder content) */
function placeholderTab(label, body) {
  return `
    ${settingsSidebar()}
    <main class="shell-main">
      <div class="page-header">
        <h1>${label}</h1>
        <p>${body}</p>
      </div>
      <p style="font-size: 13px; color: var(--text-muted);"><em>Demo:</em> this tab uses the existing Engage settings component unchanged. Click <strong>Email Channel</strong> in the sidebar to see the redesigned experience.</p>
    </main>
  `;
}

function entriModalHTML() {
  const fullDomain = `${state.byo.subdomain}.${state.byo.rootDomain}`;
  if (state.entriPhase === 'done') return entriDoneModal(fullDomain);
  if (state.entriPhase === 'iframe') return entriIframeModal(fullDomain);
  return entriIntroModal(fullDomain);
}

/* Phase 1: "How it works" intro. */
function entriIntroModal(fullDomain) {
  return `
    <div class="entri-overlay">
      <div class="entri-modal entri-modal-intro">
        <button class="entri-modal-close" onclick="entriClose()" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </button>
        <h2>Connect ${fullDomain} with Entri</h2>
        <p>Entri sets up the DNS records for your new sending domain. Here's what happens when you continue:</p>
        <ul class="entri-context-list" style="margin: 0 0 24px;">
          <li>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3L13 4.5"/></svg>
            <span><strong>We use Entri</strong> — a DNS automation partner used by major email platforms. You sign in to your DNS provider through Entri and they add the right records automatically. No copy-paste, no manual errors.</span>
          </li>
          <li>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3L13 4.5"/></svg>
            <span><strong>DNS access only.</strong> Entri only touches the records we need to publish (DKIM, Return-Path, DMARC) — nothing else in your provider account.</span>
          </li>
          <li>
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3 3L13 4.5"/></svg>
            <span><strong>Don't have DNS access?</strong> You'll be able to forward the setup to your IT contact, or add the records manually.</span>
          </li>
        </ul>
        <div class="entri-modal-actions">
          <button class="btn btn-secondary" onclick="entriClose()">Cancel</button>
          <button class="btn btn-primary" onclick="launchEntriIframe()">Continue with Entri →</button>
        </div>
        <p class="demo-note">By continuing you agree to Entri's Terms of Service and Privacy Policy.</p>
      </div>
    </div>
  `;
}

/* Phase 2: simulated Entri iframe. */
function entriIframeModal(fullDomain) {
  return `
    <div class="entri-overlay">
      <div class="entri-iframe">
        <div class="entri-iframe-bar">
          <div class="entri-iframe-brand"><span class="entri-iframe-dot">E</span> Entri</div>
          <div class="entri-iframe-url">secure.goentri.com</div>
          <button class="entri-modal-close" onclick="entriClose()" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          </button>
        </div>
        <div class="entri-iframe-body">
          <div class="entri-iframe-provider">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l9-5 9 5-9 5-9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
            <div>
              <div style="font-weight:600; font-size:14px;">We detected your DNS provider</div>
              <div style="font-size:12.5px; color:var(--text-muted);">Cloudflare · sign in to authorize the records for ${fullDomain}</div>
            </div>
          </div>
          <div class="entri-iframe-records">
            <div class="entri-iframe-record"><span>TXT</span> <code>${state.byo.subdomain}._domainkey</code> <span class="entri-iframe-tag">DKIM</span></div>
            <div class="entri-iframe-record"><span>CNAME</span> <code>pm-bounces.${state.byo.subdomain}</code> <span class="entri-iframe-tag">Return-Path</span></div>
            <div class="entri-iframe-record"><span>TXT</span> <code>_dmarc.${state.byo.subdomain}</code> <span class="entri-iframe-tag">DMARC</span></div>
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:18px;" onclick="entriSuccess()">Sign in to Cloudflare &amp; publish records</button>
          <button class="btn-link" style="display:block; margin:12px auto 0; background:none; border:0; color:var(--info); cursor:pointer; font-size:12.5px;" onclick="alert('Demo: Entri would let the user forward this setup to an IT contact via email.')">Forward setup to someone else</button>
        </div>
        <div class="entri-iframe-footer">
          <span class="demo-note" style="margin:0;">Simulated Entri iframe — not the real thing.</span>
          <button class="btn-link" style="background:none; border:0; color:var(--text-muted); cursor:pointer; font-size:12px;" onclick="entriClose()">Simulate close</button>
        </div>
      </div>
    </div>
  `;
}

/* Phase 3: Entri's "done" confirmation — placeholder + Close → hands back to us. */
function entriDoneModal(fullDomain) {
  return `
    <div class="entri-overlay">
      <div class="entri-iframe">
        <div class="entri-iframe-bar">
          <div class="entri-iframe-brand"><span class="entri-iframe-dot">E</span> Entri</div>
          <div class="entri-iframe-url">secure.goentri.com</div>
          <button class="entri-modal-close" onclick="entriFinish()" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          </button>
        </div>
        <div class="entri-iframe-body" style="text-align:center; padding:36px 28px;">
          <div style="width:48px; height:48px; margin:0 auto 16px; border-radius:999px; background:var(--success, #16a34a); color:#fff; display:flex; align-items:center; justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>
          </div>
          <div style="font-weight:600; font-size:16px; margin-bottom:6px;">Records published</div>
          <p style="font-size:13px; color:var(--text-muted); line-height:1.55; max-width:380px; margin:0 auto 4px;">Entri added the DNS records for <code style="font-family:var(--font-mono); font-size:12px;">${fullDomain}</code> to your provider. They'll propagate over the next few minutes — you can close this and keep working.</p>
          <p class="demo-note" style="margin:14px 0 20px;">Placeholder — in production this is Entri's confirmation, returned to us via callback.</p>
          <button class="btn btn-primary" onclick="entriFinish()">Close</button>
        </div>
        <div class="entri-iframe-footer">
          <span class="demo-note" style="margin:0;">Simulated Entri iframe — not the real thing.</span>
        </div>
      </div>
    </div>
  `;
}

function confirmModalHTML() {
  if (!state.confirmModal) return '';
  return `
    <div class="confirm-overlay">
      <div class="confirm-modal">
        <h2>${state.confirmModal.title}</h2>
        <p>${state.confirmModal.body}</p>
        <div class="actions">
          <button class="btn btn-ghost" onclick="state.confirmModal=null; render();">Cancel</button>
          <button class="btn btn-danger" onclick="(${state.confirmModal.onConfirm.toString()})()">${state.confirmModal.confirmLabel}</button>
        </div>
      </div>
    </div>
  `;
}

function toastHTML() {
  if (!state.toast) return '';
  const bg = state.toast.kind === 'success' ? 'var(--success)' : 'var(--info)';
  return `
    <div style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: ${bg}; color: white; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; box-shadow: 0 6px 24px rgba(0,0,0,0.18); z-index: 90; animation: fadeIn 180ms ease;">
      ${state.toast.text}
    </div>
  `;
}

function demoSwitcher() {
  const sw = document.getElementById('demoSwitcher');
  sw.innerHTML = DEMO_SCENARIOS.map(s => `
    <button class="${state.demoScenario === s.key ? 'active' : ''}" onclick="loadDemoScenario('${s.key}')">${s.label}</button>
  `).join('');
}

/* =========================================================
   RENDER — with focus preservation across rerenders
   ========================================================= */
function render() {
  const stage = document.getElementById('stage');

  // Capture focus state BEFORE rerender
  const active = document.activeElement;
  let focusKey = null;
  let selStart = null, selEnd = null;
  if (active && active.dataset && active.dataset.focusKey) {
    focusKey = active.dataset.focusKey;
    if (typeof active.selectionStart === 'number') {
      selStart = active.selectionStart;
      selEnd = active.selectionEnd;
    }
  }

  let body;
  // The inline DNS wizard (existing-domain reconnect / detail-page setup) renders
  // inside that domain's detail page, so it falls through to the normal page
  // routing below. Only the full-page "Add a domain" flow swaps the shell here.
  const fullPageAddDomain = state.byo.subStep && !state.byo.inlineForDomainId;
  if (state.byo.isVerifying && !state.byo.inlineForDomainId) {
    body = `<div class="shell-body" data-mode="byo">${byoSidebar()}${byoVerifyingScreen()}</div>`;
  } else if (fullPageAddDomain) {
    body = `<div class="shell-body" data-mode="byo">${byoSidebar()}${byoDetailsPage()}</div>`;
  } else {
    let pageContent;
    if (state.tab === 'email-channel') {
      pageContent = state.selectedDomainId
        ? emailChannelDomainDetailPage(state.selectedDomainId)
        : emailChannelPage();
    }
    else if (state.tab === 'brand') pageContent = placeholderTab('Brand Settings', 'Configure your brand colors, tone, and logo for messages.');
    else if (state.tab === 'business') pageContent = placeholderTab('Business Information', 'Update your DBA, address, and contact info. Changes here may trigger SMS re-verification.');
    else if (state.tab === 'sms') pageContent = placeholderTab('SMS Channel', 'Manage your SMS sending number and request approval for new ones.');
    else if (state.tab === 'merge-fields') pageContent = placeholderTab('Merge Fields', 'Manage merge fields used for personalization in email and SMS.');
    body = `<div class="shell-body">${pageContent}</div>`;
  }

  let html = `<div class="shell">${shellHeader()}${body}</div>`;
  if (state.showEntriModal) html += entriModalHTML();
  if (state.confirmModal) html += confirmModalHTML();
  if (state.toast) html += toastHTML();

  stage.innerHTML = html;
  demoSwitcher();

  // Restore focus AFTER rerender
  if (focusKey) {
    const target = stage.querySelector('[data-focus-key="' + focusKey + '"]');
    if (target) {
      target.focus();
      if (selStart !== null && typeof target.setSelectionRange === 'function') {
        try { target.setSelectionRange(selStart, selEnd); } catch (e) { /* ignore */ }
      }
    }
  }
}

render();
</script>

</body>
</html>
