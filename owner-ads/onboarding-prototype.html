<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Acquire Onboarding — Unified Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Backgrounds */
    --bg-page:    #ececec;
    --bg-subtle:  #f9fafb;
    --bg-surface: #ffffff;
    --bg-muted:   #f5f5f5;

    /* Borders */
    --border:        #e5e7eb;
    --border-strong: #d1d5db;
    --border-focus:  #6366f1;

    /* Text */
    --text-primary:   #111827;
    --text-secondary: #6b7280;
    --text-muted:     #9ca3af;

    /* Semantic */
    --success:        #16a34a;
    --success-bg:     #f0fdf4;
    --success-border: #bbf7d0;
    --success-pill-bg: #dcfce7;
    --warning:        #d97706;
    --warning-bg:     #fffbeb;
    --warning-border: #fde68a;
    --info:           #2563eb;
    --info-bg:        #eff6ff;
    --info-border:    #bfdbfe;

    /* Radii */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;

    /* Shadow */
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04);

    /* Fonts */
    --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-display: "Plus Jakarta Sans", "Inter", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg-page);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    padding: 56px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Floating back-to-project link */
  .back-link {
    position: fixed; top: 12px; left: 12px; z-index: 9999;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    color: #64748b; background: white; border: 1px solid #e2e8f0;
    padding: 5px 11px; border-radius: 6px; text-decoration: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .back-link:hover { color: #1e293b; background: #f8fafc; }

  /* Scenario toggle bar — review-only chrome, NOT part of shell */
  .scenario-bar {
    position: fixed; top: 12px; right: 12px; z-index: 9999;
    display: flex; align-items: center; gap: 10px;
    background: white; border: 1px solid #e2e8f0;
    padding: 6px 10px;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    font-size: 12px;
  }
  .scenario-bar-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase; color: #94a3b8;
  }
  .scenario-tabs {
    display: inline-flex; gap: 2px;
    background: #f1f5f9; padding: 3px; border-radius: 6px;
  }
  .scenario-tab {
    padding: 4px 9px;
    background: transparent;
    color: #64748b;
    border: 0;
    border-radius: 4px;
    font-family: inherit; font-size: 11.5px; font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .scenario-tab:hover { color: #0f172a; }
  .scenario-tab[data-active="true"] {
    background: white;
    color: #0f172a;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
  }

  /* ============================================== */
  /* SHELL                                          */
  /* ============================================== */
  .stage { width: 100%; max-width: 1180px; }

  .shell {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    max-width: 1180px;
    min-height: 720px;
    width: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  .shell-topbar {
    padding: 22px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .shell-title h1 {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 2px;
    color: var(--text-primary);
  }
  .shell-title p {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin: 0;
  }
  .close-btn {
    color: var(--text-muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 4px;
  }
  .close-btn:hover { color: var(--text-primary); }

  .shell-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 0;
    overflow: hidden;
  }

  /* ============================================== */
  /* SIDEBAR                                        */
  /* ============================================== */
  .shell-sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-subtle);
    padding: 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
  }
  .sidebar-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    padding: 0 12px 10px;
  }

  .step-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-secondary);
    background: transparent;
    border: 0;
    cursor: pointer;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .step-item:hover:not([data-clickable="false"]) { background: rgba(15, 23, 42, 0.04); }
  .step-item[data-clickable="false"] { cursor: not-allowed; }
  .step-item[data-state="active"] {
    background: var(--bg-surface);
    color: var(--text-primary);
    font-weight: 600;
    box-shadow: var(--shadow-card);
  }
  .step-item[data-state="complete"] { color: var(--text-primary); }

  .step-marker {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: var(--bg-surface);
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0;
    color: transparent;
    position: relative;
  }
  .step-item[data-state="active"] .step-marker { border-color: var(--text-primary); }
  .step-item[data-state="active"] .step-marker::before {
    content: ""; width: 10px; height: 10px; border-radius: 999px;
    background: var(--text-primary);
  }
  .step-item[data-state="complete"] .step-marker {
    background: var(--success); border-color: var(--success);
  }
  .step-item[data-state="complete"] .step-marker::before {
    content: "✓"; font-size: 12px; font-weight: 700; color: white;
  }

  /* ============================================== */
  /* MAIN CONTENT                                   */
  /* ============================================== */
  .shell-main {
    padding: 36px 48px 32px;
    overflow-y: auto;
    max-width: 100%;
    min-height: 540px;
  }
  .shell-main-narrow { max-width: 640px; }
  .shell-main-wide { max-width: 880px; }

  .step-header { margin-bottom: 28px; }
  .step-header h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin: 0 0 8px;
    color: var(--text-primary);
  }
  .step-header p {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.55;
    max-width: 580px;
    margin: 0 0 24px;
  }

  /* Uppercase section labels (instead of h2/h3) */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 12px;
  }

  /* ============================================== */
  /* FOOTER                                         */
  /* ============================================== */
  .shell-footer {
    border-top: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-surface);
    gap: 16px;
    flex-shrink: 0;
  }
  .shell-footer .hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
    margin-right: 12px;
  }

  /* ============================================== */
  /* BUTTONS                                        */
  /* ============================================== */
  .btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    font: inherit;
    font-weight: 500;
    font-size: 14px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 120ms ease, border-color 120ms ease, opacity 120ms;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--text-primary);
    color: white;
  }
  .btn-primary:hover:not(:disabled) { background: #1f2937; }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--bg-surface);
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { border-color: var(--text-primary); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--text-primary); }
  .btn-large { padding: 11px 20px; }
  .btn-block { width: 100%; justify-content: center; }

  /* ============================================== */
  /* FORM PRIMITIVES                                */
  /* ============================================== */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .form-input, textarea.form-input {
    width: 100%;
    appearance: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font: inherit;
    font-size: 14px;
    background: var(--bg-surface);
    color: var(--text-primary);
    font-family: inherit;
    resize: vertical;
  }
  .form-input:focus, textarea.form-input:focus {
    outline: none;
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.06);
  }
  .helper {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-row > .form-group { margin-bottom: 0; }

  /* Inline prefix/suffix wrap for URL fields */
  .input-with-prefix {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg-surface);
  }
  .input-with-prefix:focus-within { box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.06); }
  .input-with-prefix .prefix {
    background: var(--bg-subtle);
    border-right: 1px solid var(--border);
    padding: 0 12px;
    display: inline-flex;
    align-items: center;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .input-with-prefix input {
    border: 0;
    padding: 9px 12px;
    flex: 1;
    font: inherit;
    font-size: 14px;
    background: transparent;
    color: var(--text-primary);
  }
  .input-with-prefix input:focus { outline: none; }

  /* ============================================== */
  /* CHOICE CARDS (Step 1 prior-ads, etc.)          */
  /* ============================================== */
  .choice-stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .choice-card {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    width: 100%;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .choice-card:hover { border-color: var(--border-strong); }
  .choice-card[data-selected="true"] {
    border-color: var(--text-primary);
    background: var(--bg-subtle);
  }
  .choice-radio {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 1.5px solid var(--border-strong);
    margin-top: 2px;
    position: relative;
    flex-shrink: 0;
  }
  .choice-card[data-selected="true"] .choice-radio { border-color: var(--text-primary); }
  .choice-card[data-selected="true"] .choice-radio::after {
    content: ""; position: absolute; inset: 3px;
    background: var(--text-primary); border-radius: 999px;
  }
  .choice-card .label {
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
  }
  .choice-card .sub {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ============================================== */
  /* INFO + WARNING BANNERS                         */
  /* ============================================== */
  .info-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .info-banner svg { color: var(--info); flex-shrink: 0; margin-top: 1px; }
  .info-banner strong { color: var(--text-primary); font-weight: 600; }

  .warning-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--warning);
    margin-bottom: 20px;
  }
  .warning-banner svg { color: var(--warning); flex-shrink: 0; margin-top: 1px; }
  .warning-banner strong { color: #a16207; font-weight: 700; }

  .success-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--success);
  }
  .success-banner svg { color: var(--success); flex-shrink: 0; margin-top: 1px; }
  .success-banner strong { color: #15803d; font-weight: 700; }

  /* ============================================== */
  /* PAUSE-AND-CONFIRM PANEL (Step 1)               */
  /* ============================================== */
  .pause-panel {
    margin-top: 16px;
    padding: 18px;
    background: var(--bg-subtle);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-md);
  }
  .pause-panel h4 {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
  }
  .pause-panel ol {
    margin: 0 0 14px 18px;
    padding: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .pause-confirm {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
  }
  .pause-confirm input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--text-primary);
  }

  /* ============================================== */
  /* OAUTH CONNECT CARD                             */
  /* ============================================== */
  .oauth-card {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 28px 24px;
    text-align: center;
  }
  .oauth-logo {
    width: 48px; height: 48px;
    border-radius: 12px;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
  }
  .oauth-logo[data-provider="gads"] {
    background-image: conic-gradient(from 0deg, #4285f4 0deg 90deg, #34a853 90deg 180deg, #fbbc05 180deg 270deg, #ea4335 270deg 360deg);
  }
  .oauth-logo[data-provider="gbp"] {
    background-image: conic-gradient(from 0deg, #4285f4 0deg 90deg, #34a853 90deg 180deg, #fbbc05 180deg 270deg, #ea4335 270deg 360deg);
  }
  .oauth-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 6px;
    color: var(--text-primary);
  }
  .oauth-sub {
    font-size: 13px; color: var(--text-secondary);
    max-width: 380px; margin: 0 auto 18px; line-height: 1.55;
  }

  .oauth-connected {
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    border-radius: var(--radius-md);
    padding: 18px 20px;
  }
  .oauth-conn-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .oauth-conn-icon {
    width: 32px; height: 32px;
    border-radius: 999px;
    background: var(--success);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
  }
  .oauth-conn-text .biz {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14.5px;
    color: var(--text-primary);
  }
  .oauth-conn-text .meta {
    font-size: 12.5px; color: #15803d;
    margin-top: 1px;
  }
  .oauth-conn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding-top: 14px;
    border-top: 1px solid var(--success-border);
  }
  .oauth-conn-stat {
    font-size: 12px;
    color: #15803d;
  }
  .oauth-conn-stat strong {
    display: block;
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    color: #15803d;
  }
  .oauth-disconnect {
    background: none; border: 0; padding: 0;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
  }
  .oauth-disconnect:hover { color: var(--text-primary); text-decoration: underline; }

  /* ============================================== */
  /* LOCATION MAPPING GRID (Step 4)                 */
  /* ============================================== */
  .locmap-grid {
    display: flex; flex-direction: column;
    gap: 6px;
  }
  .locmap-row {
    display: grid;
    grid-template-columns: 24px 1fr 32px 1fr;
    gap: 14px;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: opacity 120ms ease, background 120ms ease, border-color 120ms ease;
  }
  .locmap-row[data-excluded="true"] {
    opacity: 0.55;
    background: var(--bg-subtle);
  }
  .locmap-row[data-unmapped="true"] {
    border-color: var(--warning-border);
    background: var(--warning-bg);
  }
  .locmap-include {
    width: 18px; height: 18px;
    accent-color: var(--text-primary);
    cursor: pointer;
  }
  .locmap-loc .name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .locmap-loc .addr {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .locmap-arrow {
    color: var(--text-muted);
    text-align: center;
  }
  .locmap-gbp-mapped {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px;
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #15803d;
  }
  .locmap-gbp-mapped .check {
    width: 16px; height: 16px;
    border-radius: 999px;
    background: var(--success);
    color: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 10px; font-weight: 700;
  }
  .locmap-gbp-mapped .text { flex: 1; min-width: 0; }
  .locmap-gbp-mapped .name {
    font-weight: 600;
    color: #15803d;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .locmap-gbp-mapped .addr {
    font-size: 11.5px;
    color: #15803d;
  }
  .locmap-gbp-mapped .clear {
    background: none; border: 0; cursor: pointer;
    color: #15803d;
    padding: 2px;
    font-size: 14px;
  }
  .locmap-gbp-picker select {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .locmap-excluded-text {
    font-size: 12.5px;
    color: var(--text-muted);
    font-style: italic;
  }
  .locmap-summary {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
  }
  .locmap-summary strong { color: var(--text-primary); }

  /* ============================================== */
  /* GTM OPTIONS (Step 5)                           */
  /* ============================================== */
  .gtm-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ============================================== */
  /* GOAL CARDS (Step 6)                            */
  /* ============================================== */
  .goal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .goal-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .goal-card:hover { border-color: var(--border-strong); }
  .goal-card[data-selected="true"] {
    border-color: var(--text-primary);
    background: var(--bg-subtle);
  }
  .goal-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    background: var(--bg-subtle);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    font-size: 16px;
  }
  .goal-card[data-selected="true"] .goal-icon {
    background: var(--text-primary);
    color: white;
  }
  .goal-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14.5px;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .goal-desc {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ============================================== */
  /* PER-LOCATION CARD COLLAPSE (Step 7)            */
  /* ============================================== */
  .location-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .location-card-head {
    padding: 12px 16px;
    background: var(--bg-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    border-bottom: 1px solid transparent;
  }
  .location-card[data-expanded="true"] .location-card-head { border-bottom-color: var(--border); }
  .location-card-head .name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text-primary);
  }
  .location-card-head .summary {
    font-size: 12px; color: var(--text-secondary);
    margin-top: 2px;
  }
  .location-card-head .chev {
    color: var(--text-muted);
    transition: transform 200ms;
  }
  .location-card[data-expanded="true"] .location-card-head .chev { transform: rotate(180deg); }
  .location-card-body {
    padding: 18px 16px;
    display: none;
  }
  .location-card[data-expanded="true"] .location-card-body { display: block; }
  .apply-all-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    text-decoration: underline;
    background: none; border: 0; padding: 0;
    font-family: inherit;
  }
  .apply-all-link:hover { color: var(--text-secondary); }

  /* Service area map */
  .area-card {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 14px;
    align-items: center;
  }
  .area-map {
    width: 120px; height: 120px;
    border-radius: var(--radius-sm);
    background:
      radial-gradient(circle at 50% 50%, rgba(17,24,39,0.10) 0%, rgba(17,24,39,0.10) 40%, transparent 41%),
      radial-gradient(circle at 50% 50%, rgba(17,24,39,0.45) 0%, rgba(17,24,39,0.45) 4px, transparent 5px),
      linear-gradient(135deg, hsl(220 15% 92%), hsl(220 10% 88%));
    border: 1px solid var(--border);
  }
  .area-info .where {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text-primary);
    margin-bottom: 3px;
  }
  .area-info .addr {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .radius-row {
    display: flex; align-items: center; gap: 10px;
  }
  .radius-row input[type="range"] {
    flex: 1; accent-color: var(--text-primary);
  }
  .radius-value {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    min-width: 60px;
    color: var(--text-primary);
  }
  .targeting-tabs {
    display: inline-flex;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
    margin-bottom: 12px;
  }
  .targeting-tab {
    padding: 5px 11px;
    background: transparent;
    color: var(--text-secondary);
    border: 0;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .targeting-tab[data-active="true"] {
    background: var(--bg-surface);
    color: var(--text-primary);
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
  }

  /* ============================================== */
  /* DETECTED VERTICAL CHIP (Step 8)                */
  /* ============================================== */
  .vertical-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--text-secondary);
    margin-bottom: 18px;
  }
  .vertical-chip svg { color: var(--success); flex-shrink: 0; }
  .vertical-chip strong { color: var(--text-primary); font-weight: 600; }
  .vertical-chip .change-link {
    background: none; border: 0;
    color: var(--text-primary);
    font-size: inherit;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    margin-left: 2px;
  }
  .regen-link {
    background: none; border: 0; padding: 0;
    color: var(--text-primary);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    text-decoration: underline;
    margin-top: 4px;
  }
  .regen-link:hover { color: var(--text-secondary); }

  /* ============================================== */
  /* BUDGET (Step 9)                                */
  /* ============================================== */
  .budget-display {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 22px;
    margin-bottom: 16px;
  }
  .budget-display .amt {
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .budget-display .amt small {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-left: 4px;
  }
  .budget-rec-pill {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .budget-slider {
    width: 100%;
    accent-color: var(--text-primary);
    height: 4px;
  }
  .budget-scale {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 11.5px;
    color: var(--text-muted);
  }
  .budget-projection {
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-secondary);
  }
  .budget-projection strong { color: var(--text-primary); font-weight: 600; }
  .budget-coverage {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #15803d;
  }
  .budget-coverage strong { color: #15803d; font-weight: 700; }

  /* ============================================== */
  /* AD COPY REVIEW (Step 10)                       */
  /* ============================================== */
  .ai-banner {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-subtle);
    margin-bottom: 20px;
  }
  .ai-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    background: var(--text-primary);
    color: white;
    font-weight: 700;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .ai-banner-title {
    font-weight: 600; font-size: 13.5px;
    color: var(--text-primary);
    margin-bottom: 1px;
  }
  .ai-banner-sub {
    color: var(--text-secondary); font-size: 12.5px;
    line-height: 1.45;
  }

  .review-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .headlines-stack { display: flex; flex-direction: column; gap: 6px; }
  .headline-line {
    display: grid;
    grid-template-columns: 1fr 28px;
    gap: 6px;
    align-items: center;
  }
  .headline-line input { font-size: 13px; padding: 7px 10px; }
  .regen-btn {
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .regen-btn:hover { color: var(--text-primary); border-color: var(--border-strong); }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-primary);
  }
  .chip .x { color: var(--text-muted); cursor: pointer; }
  .add-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .add-chip:hover { color: var(--text-primary); border-color: var(--text-primary); }

  /* Preview pane (Google) */
  .preview-pane {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .preview-eyebrow {
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .search-ad {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 10px;
  }
  .search-ad-head {
    display: grid;
    grid-template-columns: auto auto 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .search-sponsored { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .search-favicon {
    width: 20px; height: 20px;
    border-radius: 999px;
    background: linear-gradient(135deg, #f5a623, #e63946);
    color: white;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 10px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .search-domain { font-size: 12px; color: var(--text-primary); font-weight: 600; }
  .search-domain-sub { font-size: 10.5px; color: var(--text-secondary); }
  .search-headline {
    color: #1a0dab;
    font-size: 15px;
    line-height: 1.25;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .search-desc {
    color: #4d5156;
    font-size: 12px;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .search-sitelinks {
    display: flex;
    gap: 12px;
    font-size: 11.5px;
    color: #1a73e8;
  }
  .map-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px;
  }
  .map-card-head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
  }
  .map-pin-mini {
    width: 10px; height: 14px;
    background: #ea4335;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
  }
  .map-card-title { font-weight: 600; font-size: 12.5px; }
  .map-card-meta { font-size: 10.5px; color: var(--text-secondary); }
  .map-card-badge {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--bg-subtle);
    color: var(--text-secondary);
    padding: 3px 7px;
    border-radius: 999px;
    font-weight: 700;
  }
  .map-card-row { display: flex; gap: 6px; }
  .map-card-action {
    flex: 1;
    text-align: center;
    background: var(--bg-subtle);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 0;
    border-radius: 999px;
  }
  .map-card-action.primary {
    background: var(--text-primary);
    color: white;
  }

  /* ============================================== */
  /* PIXEL INSTALL (Step 11)                        */
  /* ============================================== */
  .pixel-card {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 16px;
  }
  .pixel-snippet-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .pixel-snippet-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text-primary);
  }
  .pixel-snippet-sub {
    font-size: 12px; color: var(--text-secondary);
    margin-top: 2px;
  }
  .pixel-snippet-sub code {
    background: var(--bg-surface);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 11px;
    border: 1px solid var(--border);
  }
  .pixel-snippet {
    background: #0f172a;
    color: #6ee7b7;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.6;
    overflow-x: auto;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .pixel-platforms {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .pixel-platform {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
  }
  .pixel-platform:hover { color: var(--text-primary); border-color: var(--border-strong); }
  .pixel-platform .name { font-weight: 500; color: var(--text-primary); }
  .pixel-confirm-options {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .pixel-confirm-card {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    width: 100%;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .pixel-confirm-card:hover { border-color: var(--border-strong); }
  .pixel-confirm-card[data-selected="true"] {
    border-color: var(--text-primary);
    background: var(--bg-subtle);
  }
  .pixel-confirm-card input[type="checkbox"] {
    width: 18px; height: 18px;
    margin-top: 1px;
    accent-color: var(--text-primary);
    flex-shrink: 0;
  }
  .pixel-confirm-card .label {
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
  }
  .pixel-confirm-card .sub {
    font-size: 12.5px; color: var(--text-secondary);
    line-height: 1.5;
  }
  .pixel-defer-card {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    width: 100%;
    transition: border-color 120ms ease;
  }
  .pixel-defer-card:hover { border-color: var(--border-strong); }
  .pixel-defer-card .label {
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
  }
  .pixel-defer-card .sub {
    font-size: 12.5px; color: var(--text-secondary);
    line-height: 1.5;
  }
  .pixel-defer-card svg { color: var(--text-secondary); flex-shrink: 0; }

  .copy-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: var(--border-strong); }

  /* ============================================== */
  /* REVIEW & SUBMIT (Step 12)                      */
  /* ============================================== */
  .summary-card {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 22px;
    margin-bottom: 20px;
  }
  .summary-card h3 {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .summary-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .key { color: var(--text-secondary); }
  .summary-row .val { color: var(--text-primary); font-weight: 500; }

  .timeline {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    margin-bottom: 20px;
  }
  .timeline-head {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .timeline-track {
    position: relative;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    padding: 0 12px;
  }
  .timeline-track::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 12px;
    right: 12px;
    height: 2px;
    background: linear-gradient(90deg, var(--text-primary) 12%, var(--border) 12%);
    border-radius: 2px;
  }
  .timeline-step { position: relative; }
  .timeline-step .dot {
    width: 18px; height: 18px;
    border-radius: 999px;
    background: var(--bg-surface);
    border: 2px solid var(--border-strong);
    margin: 0 auto 10px;
    position: relative; z-index: 2;
  }
  .timeline-step[data-state="now"] .dot {
    background: var(--text-primary);
    border-color: var(--text-primary);
    box-shadow: 0 0 0 4px var(--bg-subtle);
  }
  .timeline-step .week {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .timeline-step[data-state="now"] .week { color: var(--text-primary); }
  .timeline-step .what {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .timeline-expectations {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .timeline-expectations strong { color: var(--text-primary); font-weight: 600; }

  .terms-confirm {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .terms-confirm input[type="checkbox"] {
    width: 16px; height: 16px;
    margin-top: 1px;
    accent-color: var(--text-primary);
    flex-shrink: 0;
  }
  .terms-confirm .text {
    font-size: 13px;
    color: var(--text-primary);
  }
  .terms-confirm .text a {

</style>

  <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2L3 6.5l5 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>

</a>

<div class="scenario-bar">

  <div class="scenario-tabs" id="scenario-tabs">
    <button class="scenario-tab" data-active="true" data-sc="owner-multi">Owner · multi</button>
    <button class="scenario-tab" data-active="false" data-sc="owner-single">Owner · single</button>

<div class="stage">
  <div id="app"><!-- rendered by JS --></div>
</div>

<div class="confetti-layer" id="confetti"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   SCENARIOS — partner+tenant configs that vary content (not chrome style)
   ═══════════════════════════════════════════════════════════════════════ */
const SCENARIOS = {
  'owner-multi': {
    productName: 'Owner Ads',
    accountOwnership: 'reach-owned',
    billing: 'reach-pays',
    billingPartnerName: 'Owner',
    gtmRequired: false,
    pixelRequired: false,
    locations: [
      { id: 'court', name: "Junior's Pizzeria — Court St", addr: '318 Court St, Brooklyn, NY', gbpDefault: 'court' },
      { id: '5th',   name: "Junior's Pizzeria — 5th Ave",  addr: '425 5th Ave, Brooklyn, NY',  gbpDefault: '5th' },
      { id: 'astor', name: "Junior's Pizzeria — Astoria",  addr: '28-12 Steinway St, Astoria, NY', gbpDefault: 'astor' },
    ],
    gbpLocations: [
      { id: 'court', title: "Junior's Pizzeria",              addr: '318 Court St, Brooklyn, NY' },
      { id: '5th',   title: "Junior's Pizzeria — Park Slope", addr: '425 5th Ave, Brooklyn, NY' },
      { id: 'astor', title: "Junior's Pizzeria — Astoria",    addr: '28-12 Steinway St, Astoria, NY' },
    ],
  },
  'owner-single': {
    productName: 'Owner Ads',
    accountOwnership: 'reach-owned',
    billing: 'reach-pays',
    billingPartnerName: 'Owner',
    gtmRequired: false,
    pixelRequired: false,
    locations: [
      { id: 'court', name: "Junior's Pizzeria", addr: '318 Court St, Brooklyn, NY', gbpDefault: 'court' },
    ],
    gbpLocations: [
      { id: 'court', title: "Junior's Pizzeria", addr: '318 Court St, Brooklyn, NY' },
    ],
  },
  'tableside': {
    productName: 'Tableside Ads',
    accountOwnership: 'operator-owned',
    billing: 'operator-pays',
    billingPartnerName: 'Tableside',
    gtmRequired: true,
    pixelRequired: true,
    locations: [
      { id: 'court', name: "Junior's Pizzeria", addr: '318 Court St, Brooklyn, NY', gbpDefault: 'court' },
    ],
    gbpLocations: [
      { id: 'court', title: "Junior's Pizzeria", addr: '318 Court St, Brooklyn, NY' },
    ],
  },
};

/* ═══════════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════════════ */
let scenarioName = 'owner-multi';
let scenario = SCENARIOS[scenarioName];

const state = {
  step: null,            // current step key
  completed: new Set(),  // step keys already passed through
  priorAds: null,        // 'never' | 'had' | 'running'
  pauseConfirmed: false,
  gadsConnected: false,
  gbpConnected: false,
  locmap: {},
  gtmOption: 'oauth',
  goal: 'online-orders',
  radius: {},            // per-location radius value
  expandedLocCard: null, // currently expanded location card
  budget: 22,
  vertical: 'pizzeria',
  pixelStatus: null,     // 'confirmed-by-operator' | 'deferred-to-webmaster' | null
  termsAccepted: false,
  submitted: false,

  // ── Sub-journey: create Google Ads account on operator's behalf ──
  gadsCreate: {
    active: false,                 // true while inside the sub-journey
    subStep: 'business-info',      // current sub-step key
    completedSubs: new Set(),      // sub-step keys already passed through
    provisioning: false,           // true during the simulated "creating account" spinner
    complete: false,               // true once the account is created (shows success state)
    legalName: "Junior's Pizzeria LLC",
    addressLine1: '318 Court St',
    addressLine2: '',
    city: 'Brooklyn',
    region: 'NY',
    postalCode: '11231',
    country: 'United States',
    website: 'juniorspizzeria.com',
    operatorName: 'Maria Junior',
    operatorEmail: 'maria@juniorspizzeria.com',
    billingCountry: 'United States',
    timeZone: '(GMT-04:00) New York Time',
    currency: 'US Dollar (USD $)',
    paymentMethodAdded: false,
  },
};

/* ═══════════════════════════════════════════════════════════════════════
   STEP LIBRARY — keys + sidebar labels (noun, not verb)
   ═══════════════════════════════════════════════════════════════════════ */
const ALL_STEPS = [
  { key: 'account-status', label: 'Account status' },
  { key: 'connect-gads',   label: 'Ads account' },
  { key: 'connect-gbp',    label: 'Google Business' },
  { key: 'locations',      label: 'Locations' },
  { key: 'gtm',            label: 'Tag Manager',    showIf: (s) => s.gtmRequired },
  { key: 'goal',           label: 'Goal' },
  { key: 'service-area',   label: 'Service area' },
  { key: 'about',          label: 'About your restaurant' },
  { key: 'budget',         label: 'Budget' },
  { key: 'ad-copy',        label: 'Ad copy' },
  { key: 'pixel',          label: 'Tracking pixel', showIf: (s) => s.pixelRequired },
  { key: 'review',         label: 'Review & submit' },
];

function visibleSteps() {
  return ALL_STEPS.filter(s => !s.showIf || s.showIf(scenario));
}

/* ═══════════════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════════════ */
function goToStep(key) {
  state.step = key;
  render();
}

function continueStep() {
  state.completed.add(state.step);
  const steps = visibleSteps();
  const idx = steps.findIndex(s => s.key === state.step);
  if (idx === steps.length - 1) return; // last step (review) submits, not continues
  state.step = steps[idx + 1].key;
  render();
}

function backStep() {
  const steps = visibleSteps();
  const idx = steps.findIndex(s => s.key === state.step);
  if (idx > 0) {
    state.step = steps[idx - 1].key;
    render();
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   SHELL — topbar / sidebar / footer
   ═══════════════════════════════════════════════════════════════════════ */
function shellHeader() {
  return `
    <header class="shell-topbar">
      <div class="shell-title">
        <h1>${scenario.productName} Setup</h1>
        <p>Set up Google ads for your restaurant. We'll handle the hard parts.</p>
      </div>
      <button class="close-btn" aria-label="Close" onclick="alert('Close behavior: confirmation dialog + save draft. Not implemented in prototype.')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </header>
  `;
}

function sidebar() {
  const steps = visibleSteps();
  const eyebrow = (scenario.productName + ' SETUP').toUpperCase();
  return `
    <aside class="shell-sidebar">
      <div class="sidebar-eyebrow">${eyebrow}</div>
      ${steps.map(s => {
        const isActive = state.step === s.key;
        const isComplete = state.completed.has(s.key);
        const stateAttr = isComplete ? 'complete' : (isActive ? 'active' : 'upcoming');
        const clickable = isComplete || isActive;
        const onclick = clickable && !isActive ? `onclick="goToStep('${s.key}')"` : '';
        return `
          <button class="step-item" data-state="${stateAttr}" data-clickable="${clickable}" ${onclick} ${clickable ? '' : 'disabled'}>
            <span class="step-marker" aria-hidden="true"></span>
            ${s.label}
          </button>
        `;
      }).join('')}
    </aside>
  `;
}

function footer({ canContinue = true, continueLabel = 'Continue', onContinue = 'continueStep()', onBack = 'backStep()', showBack = true, hint = null } = {}) {
  return `
    <footer class="shell-footer">
      ${showBack
        ? `<button class="btn btn-ghost" onclick="${onBack}">← Previous</button>`
        : `<span></span>`}
      ${hint ? `<span class="hint">${hint}</span>` : ''}
      <button class="btn btn-primary" ${canContinue ? '' : 'disabled'} onclick="${onContinue}">${continueLabel}</button>
    </footer>
  `;
}

function shellWrap({ content, footerOpts = {}, hideFooter = false }) {
  return `
    <div class="shell">
      ${shellHeader()}
      <div class="shell-body">
        ${sidebar()}
        <main class="shell-main">${content}</main>
      </div>
      ${hideFooter ? '' : footer(footerOpts)}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════════════
   STEP RENDERERS
   ═══════════════════════════════════════════════════════════════════════ */

/* ─── 1. Account status / prior-ads check ─── */
function stepAccountStatus() {
  const isReachOwned = scenario.accountOwnership === 'reach-owned';
  const showPause = state.priorAds === 'running' && isReachOwned;
  const canContinue = !!state.priorAds && (state.priorAds !== 'running' || !isReachOwned || state.pauseConfirmed);

  const runningSub = isReachOwned
    ? "No problem — but you'll need to pause those campaigns before we launch yours."
    : "No problem — we'll just connect to your existing account.";

  const content = `
    <div class="shell-main-narrow">
      <div class="step-header">
        <h1>Have you ever run Google Ads?</h1>
        <p>Either yourself, through an agency, or through any other service. We ask because it changes how we set things up.</p>
      </div>

      <div class="choice-stack">
        <button class="choice-card" data-selected="${state.priorAds === 'never'}" onclick="pickPriorAds('never')">
          <span class="choice-radio"></span>
          <div>
            <div class="label">No, I've never run Google Ads</div>
            <div class="sub">You're starting fresh. We'll handle everything from here.</div>
          </div>
        </button>
        <button class="choice-card" data-selected="${state.priorAds === 'had'}" onclick="pickPriorAds('had')">
          <span class="choice-radio"></span>
          <div>
            <div class="label">I have in the past, but nothing is running now</div>
            <div class="sub">Great — as long as nothing is currently active, we're good to go.</div>
          </div>
        </button>
        <button class="choice-card" data-selected="${state.priorAds === 'running'}" onclick="pickPriorAds('running')">
          <span class="choice-radio"></span>
          <div>
            <div class="label">Yes, I have ads running right now</div>
            <div class="sub">${runningSub}</div>
          </div>
        </button>
      </div>

      ${showPause ? `
        <div class="warning-banner" style="margin-top: 16px;">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8"/><path d="M10 6v4M10 14h.01"/></svg>
          <div><strong>Why this matters:</strong> We'll run ads from a separate Google Ads account in our system. Your old campaigns and our new ones would compete against each other in Google's auction, so we need you to pause yours first.</div>
        </div>

        <div class="pause-panel">
          <h4>Here's what to do</h4>
          <ol>
            <li>Open Google Ads (ads.google.com) in a new tab and sign in.</li>
            <li>Go to Campaigns. For each active campaign, click the status toggle to pause it.</li>
            <li>Wait until every campaign shows status Paused.</li>
            <li>Come back here and check the box below.</li>
          </ol>
          <label class="pause-confirm">
            <input type="checkbox" ${state.pauseConfirmed ? 'checked' : ''} onchange="state.pauseConfirmed = this.checked; render();">
            <span><strong>I've paused all of my existing Google Ads campaigns.</strong></span>
          </label>
        </div>
      ` : ''}
    </div>
  `;
  return shellWrap({ content, footerOpts: { canContinue, showBack: false } });
}

function pickPriorAds(val) {
  state.priorAds = val;
  if (val !== 'running' || scenario.accountOwnership === 'operator-owned') {
    state.pauseConfirmed = true;
  } else {
    state.pauseConfirmed = false;
  }
  render();
}

/* ─── 2. Connect Google Ads ─── */

// Decide which path the operator gets at Step 2:
//  - 'connect': OAuth to an existing account (operator-owned + has/had ads)
//  - 'create' : sub-journey to create an account on operator's behalf
//               (everyone on reach-owned; operator-owned + 'never had ads')
function gadsStepMode() {
  if (scenario.accountOwnership === 'reach-owned') return 'create';
  if (state.priorAds === 'never') return 'create';
  return 'connect';
}

function stepConnectGads() {
  const mode = gadsStepMode();
  if (mode === 'create') {
    return stepGadsCreate();
  }

  // Mode 'connect' — existing OAuth flow
  const content = `
    <div class="shell-main-narrow">
      <div class="step-header">
        <h1>Connect your Google Ads account</h1>
        <p>Sign in to Google. We'll link your existing account to our system so we can manage your campaign for you.</p>
      </div>

      ${state.gadsConnected ? `
        <div class="oauth-connected">
          <div class="oauth-conn-head">
            <div class="oauth-conn-icon">✓</div>
            <div class="oauth-conn-text">
              <div class="biz">Junior's Pizzeria — Google Ads</div>
              <div class="meta">Customer ID 471-238-9925 · linked to Reach</div>
            </div>
            <button class="oauth-disconnect" onclick="state.gadsConnected = false; render();">Disconnect</button>
          </div>
        </div>
      ` : `
        <div class="oauth-card">
          <div class="oauth-logo" data-provider="gads">G</div>
          <div class="oauth-title">Sign in with Google Ads</div>
          <div class="oauth-sub">You'll be redirected to Google. Once you're signed in we'll link to our system automatically.</div>
          <button class="btn btn-primary btn-large" onclick="connectGads()">Connect Google Ads</button>
        </div>
      `}
    </div>
  `;
  return shellWrap({ content, footerOpts: { canContinue: state.gadsConnected } });
}

function connectGads() {
  // Simulate OAuth round-trip
  setTimeout(() => { state.gadsConnected = true; render(); }, 700);
}

/* ════════════════════════════════════════════════════════════════════════
   SUB-JOURNEY: Create a Google Ads account on the operator's behalf
   ════════════════════════════════════════════════════════════════════════
   Triggered at Step 2 when gadsStepMode() === 'create'.
   Replaces the outer sidebar with a sub-journey sidebar (eyebrow + back to
   parent step + indented sub-step list with dashed left border).
   Five sub-steps; billing is conditionally included for operator-pays scenarios.
   On the final sub-step, the primary button reads "Create my account" and
   triggers a simulated provisioning state, then a scenario-appropriate success.
   ════════════════════════════════════════════════════════════════════════ */

function gadsCreateSubSteps() {
  const showBilling = scenario.billing === 'operator-pays';
  const all = [
    { key: 'business-info',    label: 'Business info' },
    { key: 'your-info',        label: 'Your info' },
    { key: 'account-settings', label: 'Account settings' },
    { key: 'billing',          label: 'Billing',           show: showBilling },
    { key: 'create',           label: 'Create' },
  ];
  return all.filter(s => s.show !== false);
}

function stepGadsCreate() {
  const gc = state.gadsCreate;
  if (gc.complete) return shellGadsCreateSuccess();
  if (gc.provisioning) return shellGadsCreateProvisioning();

  // Initialize sub-step if entering for first time
  if (!gc.active) {
    gc.active = true;
    gc.subStep = 'business-info';
  }

  switch (gc.subStep) {
    case 'business-info':    return subStepBusinessInfo();
    case 'your-info':        return subStepYourInfo();
    case 'account-settings': return subStepAccountSettings();
    case 'billing':          return subStepBilling();
    case 'create':           return subStepCreate();
    default:                 return subStepBusinessInfo();
  }
}

/* ──────── Sub-journey navigation ──────── */
function gadsSubGoTo(key) {
  state.gadsCreate.subStep = key;
  render();
}

function gadsSubNext() {
  const subs = gadsCreateSubSteps();
  const idx = subs.findIndex(s => s.key === state.gadsCreate.subStep);
  state.gadsCreate.completedSubs.add(state.gadsCreate.subStep);
  if (idx < subs.length - 1) {
    state.gadsCreate.subStep = subs[idx + 1].key;
  }
  render();
}

function gadsSubBack() {
  const subs = gadsCreateSubSteps();
  const idx = subs.findIndex(s => s.key === state.gadsCreate.subStep);
  if (idx > 0) {
    state.gadsCreate.subStep = subs[idx - 1].key;
    render();
  } else {
    // First sub-step — exit the sub-journey back to the outer step
    // (which renders Step 1 since they came forward from there)
    state.gadsCreate.active = false;
    backStep();
  }
}

function gadsExitToParent() {
  // Ghost back-button at the top of the sub-journey sidebar
  state.gadsCreate.active = false;
  // Stay on Step 2 — they exited the sub-journey but might want to re-enter
  // For prototype simplicity, kick them back to Step 1
  backStep();
}

function gadsCreateAccount() {
  state.gadsCreate.provisioning = true;
  render();
  setTimeout(() => {
    state.gadsCreate.provisioning = false;
    state.gadsCreate.complete = true;
    state.gadsConnected = true;  // mark Step 2 satisfied for continue gating
    render();
  }, 1800);
}

function gadsContinueToNextStep() {
  // From the success state — advance the outer wizard
  state.completed.add('connect-gads');
  continueStep();
}

/* ──────── Sub-journey sidebar ──────── */
function gadsSubJourneySidebar() {
  const subs = gadsCreateSubSteps();
  const active = state.gadsCreate.subStep;
  const completed = state.gadsCreate.completedSubs;
  const eyebrow = (scenario.productName + ' SETUP').toUpperCase();

  const subItems = subs.map(s => {
    const isActive = active === s.key;
    const isComplete = completed.has(s.key);
    let markerStyle = 'width: 16px; height: 16px; border-radius: 999px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; position: relative; background: var(--bg-surface); border: 1.5px solid var(--border-strong);';
    let markerInner = '';
    if (isActive) {
      markerStyle = 'width: 16px; height: 16px; border-radius: 999px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; position: relative; background: var(--bg-surface); border: 1.5px solid var(--text-primary);';
      markerInner = '<span style="width: 7px; height: 7px; border-radius: 999px; background: var(--text-primary);"></span>';
    } else if (isComplete) {
      markerStyle = 'width: 16px; height: 16px; border-radius: 999px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; position: relative; background: var(--success); border: 1.5px solid var(--success); color: white; font-size: 10px; font-weight: 700;';
      markerInner = '✓';
    }
    const itemStyle = isActive
      ? 'display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; background: var(--bg-surface); color: var(--text-primary); font-weight: 500; box-shadow: var(--shadow-card);'
      : isComplete
        ? 'display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text-primary);'
        : 'display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary);';
    return `<li style="${itemStyle}">
      <span style="${markerStyle}">${markerInner}</span>
      ${s.label}
    </li>`;
  }).join('');

  return `
    <aside class="shell-sidebar">
      <div class="sidebar-eyebrow">${eyebrow}</div>
      <button class="step-item" data-state="parent" onclick="gadsExitToParent()" style="font-weight: 600; color: var(--text-primary);">
        <span style="display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; color: var(--text-secondary);">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3L4 7l5 4"/></svg>
        </span>
        Ads account
      </button>
      <ul style="list-style: none; margin: 4px 0 0; padding: 0 0 0 11px; border-left: 1px dashed var(--border-strong); margin-left: 22px; display: flex; flex-direction: column; gap: 2px;">
        ${subItems}
      </ul>
    </aside>
  `;
}

/* ──────── Sub-journey shell wrapper ──────── */

function recomputeSubStepNext() {
  // Re-render to update the disabled state of the continue button without losing focus
  // (because the input has focus, the re-render would steal it — defer using requestAnimationFrame
  // for the next paint to avoid a janky cursor jump).
  // Simpler approach: just toggle the button's disabled attribute directly.
  const gc = state.gadsCreate;
  const sub = gc.subStep;
  let canContinue = true;
  if (sub === 'business-info') {
    canContinue = !!gc.legalName.trim() && !!gc.addressLine1.trim()
      && !!gc.city.trim() && !!gc.region.trim() && !!gc.postalCode.trim()
      && !!gc.website.trim();
  } else if (sub === 'your-info') {
    canContinue = !!gc.operatorName.trim() && /\S+@\S+\.\S+/.test(gc.operatorEmail);
  }
  const btn = document.querySelector('.shell-footer .btn-primary');
  if (btn) {
    if (canContinue) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', '');
  }
}

/* ─── 4. Map locations ─── */
function stepLocations() {
  const locCount = scenario.locations.length;
  const isSingle = locCount === 1;

  // Initialize locmap if needed
  scenario.locations.forEach(loc => {
    if (!state.locmap[loc.id]) {
      state.locmap[loc.id] = { included: true, gbpLocationId: loc.gbpDefault };
    }
  });

  const includedCount = Object.values(state.locmap).filter(m => m.included).length;
  const validMap = includedCount > 0 && Object.values(state.locmap)
    .every(m => !m.included || !!m.gbpLocationId);

  const heading = isSingle ? 'Confirm your location' : 'Map your locations';
  const lead = isSingle
    ? "We'll match your restaurant to its Google Business listing."
    : "Match each restaurant location to its Google Business listing. Uncheck any location you don't want to run ads for.";

  const rows = scenario.locations.map(loc => {
    const m = state.locmap[loc.id];
    const gbpLoc = scenario.gbpLocations.find(g => g.id === m.gbpLocationId);
    let mappedSlot;
    if (!m.included) {
      mappedSlot = `<span class="locmap-excluded-text">(excluded — no ad)</span>`;
    } else if (gbpLoc) {
      mappedSlot = `
        <div class="locmap-gbp-mapped">
          <span class="check">✓</span>
          <div class="text">
            <div class="name">${gbpLoc.title}</div>
            <div class="addr">${gbpLoc.addr}</div>
          </div>
          <button class="clear" onclick="clearLocMapping('${loc.id}')" title="Clear mapping">×</button>
        </div>
      `;
    } else {
      const opts = scenario.gbpLocations.map(g =>
        `<option value="${g.id}">${g.title} — ${g.addr}</option>`
      ).join('');
      mappedSlot = `
        <div class="locmap-gbp-picker">
          <select onchange="setLocMapping('${loc.id}', this.value)">
            <option value="">Choose Google location…</option>
            ${opts}
          </select>
        </div>
      `;
    }
    return `
      <div class="locmap-row" data-excluded="${!m.included}" data-unmapped="${m.included && !m.gbpLocationId}">
        <input type="checkbox" class="locmap-include" ${m.included ? 'checked' : ''} onchange="toggleLocInclude('${loc.id}', this.checked)">
        <div class="locmap-loc">
          <div class="name">${loc.name}</div>
          <div class="addr">${loc.addr}</div>
        </div>
        <div class="locmap-arrow">↔</div>
        <div>${mappedSlot}</div>
      </div>
    `;
  }).join('');

  const content = `
    <div class="shell-main-wide">
      <div class="step-header">
        <h1>${heading}</h1>
        <p>${lead}</p>
      </div>

      <div class="locmap-grid">${rows}</div>

      <div class="locmap-summary">
        ${isSingle
          ? `Your ad will run for <strong>1 location</strong>.`
          : `You're setting up <strong>${includedCount} ${includedCount === 1 ? 'campaign' : 'campaigns'}</strong>.`}
      </div>
    </div>
  `;
  return shellWrap({ content, footerOpts: { canContinue: validMap } });
}

function toggleLocInclude(locId, checked) {
  state.locmap[locId].included = checked;
  if (!checked) {
    state.locmap[locId].gbpLocationId = null;
  } else {
    const loc = scenario.locations.find(l => l.id === locId);
    if (loc) state.locmap[locId].gbpLocationId = loc.gbpDefault;
  }
  render();
}
function setLocMapping(locId, gbpId) {
  state.locmap[locId].gbpLocationId = gbpId || null;
  render();
}
function clearLocMapping(locId) {
  state.locmap[locId].gbpLocationId = null;
  render();
}

/* ─── 9. Budget ─── */
function stepBudget() {
  const n = state.budget;
  const ordersLow = Math.round(n * 0.7);
  const ordersHi = Math.round(n * 1.2);
  let blurb;
  if (n < 12) {
    blurb = `<strong>At $${n}/day,</strong> you'll show up in search results during some windows of the day but you'll miss out on demand at peak hours. Expect roughly ${ordersLow}–${ordersHi} new online orders per week once your ad is fully ramped up.`;
  } else if (n < 35) {
    blurb = `<strong>At $${n}/day,</strong> based on what other pizzerias in Brooklyn see, we'd expect roughly ${ordersLow}–${ordersHi} new online orders per week once your ad is fully ramped up. Most of your spend will go toward people actively searching for pizza in your service area.`;
  } else {
    blurb = `<strong>At $${n}/day,</strong> you'll have one of the more aggressive ad budgets in your area — expect roughly ${ordersLow}–${ordersHi} new online orders per week and stronger coverage at every meal time.`;
  }

  const isOperatorPays = scenario.billing === 'operator-pays';
  const isMulti = scenario.locations.length > 1;
  const multiNote = isMulti ? ` <em>This applies across all ${scenario.locations.length} of your locations.</em>` : '';

  const content = `
    <div class="shell-main-narrow">

        <span>$5</span><span>$25</span><span>$50</span><span>$100+</span>
      </div>

      <div class="budget-projection">${blurb}</div>

      ${isOperatorPays ? `
        <div class="form-group" style="margin-top: 20px;">
          <label>Billing email</label>
          <input class="form-input" type="email" placeholder="receipts@your-restaurant.com">
          <span class="helper">Google sends ad spend receipts to this email.</span>

function submitCampaign() {
  state.submitted = true;
  render();

  const layer = document.getElementById('confetti');
  layer.classList.add('on');
  const colors = ['#111827', '#16a34a', '#f5a623', '#e63946', '#2563eb', '#9b51e0'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.background = colors[i % colors.length];
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    layer.appendChild(piece);
  }
  setTimeout(() => {
    layer.classList.remove('on');
    layer.innerHTML = '';
  }, 4000);
}

  });

  // Reset wizard state
  state.step = visibleSteps()[0].key;
  state.completed = new Set();
  state.priorAds = null;
  state.pauseConfirmed = false;
  state.gadsConnected = false;
  state.gbpConnected = false;
  state.locmap = {};
  state.gtmOption = 'oauth';
  state.goal = 'online-orders';
  state.radius = {};
  state.expandedLocCard = null;
  state.budget = 22;
  state.vertical = 'pizzeria';
  state.pixelStatus = null;
  state.termsAccepted = false;
  state.submitted = false;

  // Reset sub-journey state
  state.gadsCreate.active = false;
  state.gadsCreate.subStep = 'business-info';
  state.gadsCreate.completedSubs = new Set();
  state.gadsCreate.provisioning = false;
  state.gadsCreate.complete = false;
  state.gadsCreate.paymentMethodAdded = false;

  render();
}

document.querySelectorAll('.scenario-tab').forEach(t => {
  t.addEventListener('click', () => setScenario(t.dataset.sc));
});

/* ═══════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════ */
const urlParam = new URLSearchParams(window.location.search).get('scenario');
const initial = ['owner-multi', 'owner-single', 'tableside'].includes(urlParam) ? urlParam : 'owner-multi';
setScenario(initial);
</script>
